[General]
network = inet.examples.ieee80211ax.he_channel_widths.HeChannelWidthsNetwork
sim-time-limit = 0.45s
seed-set = 20260711

# Controlled variable: only channel width and its matching PHY rate change in
# the named configurations. Topology, traffic, seed, scheduler, and run length
# stay fixed so differences can be attributed to width-dependent RU capacity.

*.ap.mobility.typename = "StationaryMobility"
*.host[*].mobility.typename = "StationaryMobility"
*.ap.mobility.initFromDisplayString = false
*.host[*].mobility.initFromDisplayString = false
*.ap.mobility.initialX = 300m
*.ap.mobility.initialY = 200m
*.host[0].mobility.initialX = 220m
*.host[0].mobility.initialY = 150m
*.host[1].mobility.initialX = 220m
*.host[1].mobility.initialY = 250m
*.host[2].mobility.initialX = 380m
*.host[2].mobility.initialY = 150m
*.host[3].mobility.initialX = 380m
*.host[3].mobility.initialY = 250m
*.ap.wlan[*].address = "10:00:00:00:00:00"
*.host[*].wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"
*.radioMedium.mediumLimitCache.maxTransmissionDuration = 20ms

**.opMode = "ax"
**.centerFrequency = 5.2GHz
**.wlan[*].radio.transmitter.power = 30mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerEqualSizedRUs"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 4
**.ap.wlan[*].mac.hcf.maxHeMuPpduDuration = 1ms
**.isBlockAckSupported = true
**.wlan[*].mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 2000B

*.server.numApps = 8

# Stage 1: Warmup Trigger (Apps 0-3) to establish ADDBA agreements
*.server.app[0..3].typename = "UdpBasicApp"
*.server.app[0..3].destPort = 5000
*.server.app[0..3].messageLength = 1000B
*.server.app[0..3].sendInterval = 1s
*.server.app[0..3].startTime = 0.2s
*.server.app[0..3].stopTime = 0.25s
*.server.app[0].destAddresses = "host[0]"
*.server.app[1].destAddresses = "host[1]"
*.server.app[2].destAddresses = "host[2]"
*.server.app[3].destAddresses = "host[3]"

# Stage 2: Saturated Data Phase (Apps 4-7)
*.server.app[4..7].typename = "UdpBasicApp"
*.server.app[4..7].destPort = 5000
*.server.app[4..7].messageLength = 1000B
*.server.app[4..7].sendInterval = 0.25ms
*.server.app[4..7].startTime = 0.3s
*.server.app[4].destAddresses = "host[0]"
*.server.app[5].destAddresses = "host[1]"
*.server.app[6].destAddresses = "host[2]"
*.server.app[7].destAddresses = "host[3]"
*.host[*].numApps = 1
*.host[*].app[0].typename = "UdpSink"
*.host[*].app[0].localPort = 5000

[Config Width20MHz]
description = "20 MHz HE DL OFDMA reference with four equal stations."
# One 20 MHz HE channel contains a 242-tone full-bandwidth RU; the equal-RU
# scheduler may subdivide it to serve several stations in one HE MU PPDU.
**.bandName = "5 GHz (20 MHz)"
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 20MHz
**.wlan[*].bitrate = 14.625Mbps
**.wlan[*].radio.receiver.sensitivity = -85dBm

[Config Width40MHz]
description = "40 MHz HE DL OFDMA with the same offered load and station count."
extends = Width20MHz
**.bandName = "5 GHz (40 MHz)"
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 40MHz
**.wlan[*].bitrate = 29.25Mbps
**.wlan[*].radio.receiver.sensitivity = -82dBm

[Config Width80MHz]
description = "80 MHz HE DL OFDMA; inspect RU layout and aggregate goodput against Width20MHz."
extends = Width20MHz
**.bandName = "5 GHz (80 MHz)"
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 80MHz
**.wlan[*].bitrate = 61.25Mbps
**.wlan[*].radio.receiver.sensitivity = -79dBm

[Config Width160MHz]
description = "160 MHz HE DL OFDMA. This checks the 1992-tone full-bandwidth RU path."
extends = Width20MHz
**.bandName = "5 GHz (160 MHz)"
**.channelNumber = 1
**.wlan[*].radio.receiver.bandwidth = 160MHz
**.wlan[*].bitrate = 122.5Mbps
**.wlan[*].radio.receiver.sensitivity = -76dBm
# This is contiguous 160 MHz (a 2x996-tone RU path), not non-contiguous 80+80.

[Config WidthCellEdge]
description = "Cell Edge: Stations at 180m. Shows that 20 MHz (sensitivity -85dBm) succeeds, while 160 MHz (sensitivity -76dBm) fails due to the noise integration penalty."
extends = Width160MHz
# Move stations to 180m from the AP (300, 200)
*.host[0].mobility.initialX = 120m
*.host[0].mobility.initialY = 200m
*.host[1].mobility.initialX = 480m
*.host[1].mobility.initialY = 200m
*.host[2].mobility.initialX = 300m
*.host[2].mobility.initialY = 20m
*.host[3].mobility.initialX = 300m
*.host[3].mobility.initialY = 380m
