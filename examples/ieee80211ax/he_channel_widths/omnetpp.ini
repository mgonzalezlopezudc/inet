[General]
network = inet.examples.ieee80211ax.he_channel_widths.HeChannelWidthsNetwork
sim-time-limit = 1s
seed-set = 20260711

*.ap.mobility.typename = "StationaryMobility"
*.sta[*].mobility.typename = "StationaryMobility"
*.ap.mobility.initFromDisplayString = false
*.sta[*].mobility.initFromDisplayString = false
*.ap.mobility.initialX = 300m
*.ap.mobility.initialY = 200m
*.sta[0].mobility.initialX = 220m
*.sta[0].mobility.initialY = 150m
*.sta[1].mobility.initialX = 220m
*.sta[1].mobility.initialY = 250m
*.sta[2].mobility.initialX = 380m
*.sta[2].mobility.initialY = 150m
*.sta[3].mobility.initialX = 380m
*.sta[3].mobility.initialY = 250m
*.ap.wlan[*].address = "10:00:00:00:00:00"
*.sta[*].wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"
*.radioMedium.mediumLimitCache.maxTransmissionDuration = 20ms

**.opMode = "ax"
**.centerFrequency = 5.2GHz
**.wlan[*].radio.transmitter.power = 30mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerEqualSizedRUs"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 4
**.ap.wlan[*].mac.hcf.maxHeMuPpduDuration = 1ms
**.isBlockAckSupported = true
**.wlan[*].mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 2000B

*.server.numApps = 4
*.server.app[*].typename = "UdpBasicApp"
*.server.app[*].destPort = 5000
*.server.app[*].messageLength = 200B
*.server.app[*].sendInterval = 2ms
*.server.app[*].startTime = 0.2s
*.server.app[0].destAddresses = "sta[0]"
*.server.app[1].destAddresses = "sta[1]"
*.server.app[2].destAddresses = "sta[2]"
*.server.app[3].destAddresses = "sta[3]"
*.sta[*].numApps = 1
*.sta[*].app[0].typename = "UdpSink"
*.sta[*].app[0].localPort = 5000

[Config Width20MHz]
description = "20 MHz HE DL OFDMA reference with four equal stations."
**.bandName = "5 GHz (20 MHz)"
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 20MHz
**.wlan[*].bitrate = 14.625Mbps

[Config Width40MHz]
description = "40 MHz HE DL OFDMA with the same offered load and station count."
extends = Width20MHz
**.bandName = "5 GHz (40 MHz)"
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 40MHz
**.wlan[*].bitrate = 29.25Mbps

[Config Width80MHz]
description = "80 MHz HE DL OFDMA; inspect RU layout and aggregate goodput against Width20MHz."
extends = Width20MHz
**.bandName = "5 GHz (80 MHz)"
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 80MHz
**.wlan[*].bitrate = 61.25Mbps

[Config Width160MHz]
description = "160 MHz HE DL OFDMA. This checks the 1992-tone full-bandwidth RU path."
extends = Width20MHz
**.bandName = "5 GHz (160 MHz)"
**.channelNumber = 1
**.wlan[*].radio.receiver.bandwidth = 160MHz
**.wlan[*].bitrate = 122.5Mbps
