[General]
network = inet.examples.ieee80211ax.frequency_selective_channel.FrequencySelectiveChannelNetwork
sim-time-limit = 1.2s
warmup-period = 0.25s
num-rngs = 2

# Keep every comparison deterministic and geometrically symmetric. The four
# stations are equally far from the AP, so an RU's frequency—not distance—is
# the intended source of unequal reception quality.
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 700m
**.constraintAreaMaxY = 500m
**.constraintAreaMaxZ = 0m
**.mobility.typename = "StationaryMobility"
**.mobility.initFromDisplayString = false

**.ap.mobility.initialX = 350m
**.ap.mobility.initialY = 250m
**.host[0].mobility.initialX = 310m
**.host[0].mobility.initialY = 250m
**.host[1].mobility.initialX = 350m
**.host[1].mobility.initialY = 210m
**.host[2].mobility.initialX = 390m
**.host[2].mobility.initialY = 250m
**.host[3].mobility.initialX = 350m
**.host[3].mobility.initialY = 290m

# Addressing and association
**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

# The dimensional representation preserves power spectral density over
# frequency. DimensionalBackgroundNoise below can therefore make only a slice
# of the 80 MHz channel unusable, and an HE receiver evaluates its assigned RU.
*.radioMedium.typename = "Ieee80211DimensionalRadioMedium"
**.wlan[*].radio.typename = "Ieee80211DimensionalRadio"
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"
*.radioMedium.backgroundNoise.power = -110dBm
*.radioMedium.mediumLimitCache.minReceptionPower = -110dBm

# 802.11ax, 80 MHz, one spatial stream. The scheduler is capped at MCS 1 so a
# changing MCS does not hide the frequency-domain comparison.
**.opMode = "ax"
**.bandName = "5 GHz (80 MHz)"
**.centerFrequency = 5.2GHz
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 80MHz
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].radio.receiver.sensitivity = -95dBm
# This controlled PHY experiment keeps CCA from suppressing the AP before the
# receiver error model can expose per-RU frequency selectivity.
**.wlan[*].radio.receiver.energyDetection = -40dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
**.wlan[*].bitrate = 61.25Mbps
**.ap.wlan[*].mac.hcf.dlScheduler.heMcsSnrThresholds = "-100 -100 1000 1000 1000 1000 1000 1000 1000 1000 1000 1000"

# HE DL MU setup
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerEqualSizedRUs"
**.ap.wlan[*].mac.hcf.dlScheduler.schedulingFunction = "fBW"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 4
**.displayHeMuSignalDetails = true
**.heMuSignalLabelMaxUsers = 4
**.displayHeMuSignalPhyFields = true

# Aggregation and Block Ack make the comparison about frequency allocation
# rather than repeated setup overhead.
**.wlan[*].mac.hcf.originatorMacDataService.msduAggregationPolicy.typename = "BasicMsduAggregationPolicy"
**.isBlockAckSupported = true
**.wlan[*].mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 2000B
**.mac.hcf.originatorBlockAckAgreementPolicy.addbaFailureTimeout = 10ms

# Four warm-up flows establish Block Ack agreements; four measured small-packet
# flows then offer 12.8 Mbps in aggregate (4 * 100 B / 0.25 ms). Small queues
# are the latency/airtime use case where simultaneous RU service is meaningful.
**.server.numApps = 8
**.server.app[0..3].typename = "UdpBasicApp"
**.server.app[0..3].destPort = 80
**.server.app[0..3].messageLength = 100B
**.server.app[0..3].sendInterval = 5ms
**.server.app[0].startTime = 0.08s
**.server.app[0].stopTime = 0.10s
**.server.app[1].startTime = 0.12s
**.server.app[1].stopTime = 0.14s
**.server.app[2].startTime = 0.16s
**.server.app[2].stopTime = 0.18s
**.server.app[3].startTime = 0.20s
**.server.app[3].stopTime = 0.22s
**.server.app[0].destAddresses = "host[0]"
**.server.app[1].destAddresses = "host[1]"
**.server.app[2].destAddresses = "host[2]"
**.server.app[3].destAddresses = "host[3]"

**.server.app[4..7].typename = "UdpBasicApp"
**.server.app[4..7].destPort = 80
**.server.app[4..7].messageLength = 100B
**.server.app[4..7].sendInterval = 0.25ms
**.server.app[4..7].startTime = 0.3s
**.server.app[4].destAddresses = "host[0]"
**.server.app[5].destAddresses = "host[1]"
**.server.app[6].destAddresses = "host[2]"
**.server.app[7].destAddresses = "host[3]"

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpSink"
**.host[*].app[0].localPort = 80

# Record the evidence needed by the walkthrough without enabling verbose logs.
**.host[*].app[0].packetReceived:count.scalar-recording = true
**.host[*].app[0].endToEndDelay:vector.vector-recording = true
**.wlan[*].radio.heRuIndex:vector.vector-recording = true
**.wlan[*].radio.heRuToneSize:vector.vector-recording = true
**.wlan[*].radio.heRuToneOffset:vector.vector-recording = true
**.wlan[*].radio.minSnir:histogram.scalar-recording = true
**.wlan[*].radio.packetErrorRate:histogram.scalar-recording = true

# ---------------------------------------------------------------------------
# Reusable MAC controls
# ---------------------------------------------------------------------------
[Config Ofdma]
abstract = true
description = "Abstract HE DL OFDMA control: up to four equal-sized RUs"

[Config Su]
abstract = true
description = "Abstract matched HE SU/EDCA control"
**.mac.hcf.typename = "Hcf"
# HE HCF has one 100-packet queue per destination. Match that 400-packet total
# in the SU AP's shared best-effort queue.
**.ap.wlan[*].mac.hcf.edca.edcaf[1].pendingQueue.packetCapacity = 400

[Config PuncturingScheduler]
abstract = true
description = "Abstract puncture-aware backlog scheduler control"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerBacklogBased"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 4

[Config TwentyMHzBase]
abstract = true
description = "Abstract 20 MHz control: four 52-tone RUs and 3.2 Mbps of small-packet load"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5.19GHz
**.channelNumber = 9
**.wlan[*].radio.receiver.bandwidth = 20MHz
**.wlan[*].bitrate = 14.625Mbps
**.server.app[4..7].sendInterval = 1ms

[Config FortyMHzBase]
abstract = true
description = "Abstract 40 MHz control: four 106-tone RUs and 12.8 Mbps of small-packet load"
**.bandName = "5 GHz (40 MHz)"
**.centerFrequency = 5.18GHz
**.channelNumber = 4
**.wlan[*].radio.receiver.bandwidth = 40MHz
**.wlan[*].bitrate = 29.25Mbps

# ---------------------------------------------------------------------------
# Reusable TGax channel controls
#
# The wideband model supplies a persistent reciprocal SISO or opt-in matrix
# frequency response; TgaxIndoorPathLoss supplies the separate Model B median
# distance loss. The legacy configurations above retain their original
# free-space/flat behavior.
# ---------------------------------------------------------------------------
[Config TgaxIndoorModelB80MHz]
abstract = true
description = "Abstract TGax indoor Model B NLOS channel and median path loss for the 80 MHz BSS"
num-rngs = 3
*.radioMedium.channelModel.typename = "TgaxChannelModel"
*.radioMedium.channelModel.channelModel = "B"
*.radioMedium.channelModel.systemBandwidth = 80MHz
*.radioMedium.channelModel.referenceFrequency = 5.2GHz
*.radioMedium.channelModel.frequencyResolution = 78.125kHz
*.radioMedium.channelModel.reciprocal = true
*.radioMedium.channelModel.rng-0 = 2
*.radioMedium.pathLoss.typename = "TgaxIndoorPathLoss"
*.radioMedium.pathLoss.channelModel = "B"

[Config TgaxRbir]
abstract = true
description = "Abstract opt-in TGax RBIR receiver; calibrationFile must be supplied by the caller"
**.wlan[*].radio.receiver.errorModel.typename = "Ieee80211RbirErrorModel"
**.wlan[*].radio.receiver.errorModel.calibrationFile = ""

[Config TgaxStationaryAmbientDoppler]
abstract = true
description = "Abstract TGac stationary-user ambient Doppler evolution for the TGax indoor channel"
*.radioMedium.channelModel.timeVariation = true
*.radioMedium.channelModel.environmentalSpeed = 0.0247222mps # 0.089 km/h
*.radioMedium.channelModel.numDopplerOscillators = 32
*.radioMedium.channelModel.timeResolution = 1ms

[Config TgaxSelectedAntennaMrc]
abstract = true
description = "Abstract noise-limited static TGax matrix channel with one selected transmit antenna and receive-side MRC"
*.radioMedium.channelModel.spatialChannel = true
*.radioMedium.analogModel.enableChannelMatrixMrc = true
*.radioMedium.analogModel.channelMatrixTransmitAntenna = 0
*.radioMedium.analogModel.channelMatrixFrequencyResolution = 78.125kHz
*.ap.wlan[*].radio.antenna.numAntennas = 1
*.host[*].wlan[*].radio.antenna.numAntennas = 2

[Config TgaxSelectedAntennaLmmse]
abstract = true
extends = TgaxSelectedAntennaMrc
description = "Abstract static TGax matrix channel with covariance-aware receive-side L-MMSE combining"
*.radioMedium.analogModel.channelMatrixInterferenceMode = "lmmse"
*.radioMedium.analogModel.channelMatrixTimeResolution = 10us

# ---------------------------------------------------------------------------
# Reusable frequency-selective noise profiles
#
# DimensionalBackgroundNoise normalizes frequencyGains by its integral, so the
# power parameter is the total power across the configured noise profile.
# Absolute frequency coordinates keep the same impairment in place even when
# the receiver listens to a narrow RU. -60 dB outside the selected slice makes
# the rest of the channel effectively clean. The 100 kHz ramps avoid a
# mathematical discontinuity at slice edges.
# ---------------------------------------------------------------------------
[Config Lower20MHzImpairment]
abstract = true
*.radioMedium.backgroundNoise.typename = "DimensionalBackgroundNoise"
*.radioMedium.backgroundNoise.power = -65dBm
*.radioMedium.backgroundNoise.frequencyGains = "left 5.16GHz 0dB linear 5.17995GHz 0dB linear 5.18005GHz -60dB linear 5.24GHz -60dB right"

[Config MiddleLower20MHzImpairment]
abstract = true
*.radioMedium.backgroundNoise.typename = "DimensionalBackgroundNoise"
*.radioMedium.backgroundNoise.power = -65dBm
*.radioMedium.backgroundNoise.frequencyGains = "left 5.16GHz -60dB linear 5.17995GHz -60dB linear 5.18005GHz 0dB linear 5.19995GHz 0dB linear 5.20005GHz -60dB linear 5.24GHz -60dB right"

[Config MiddleUpper20MHzImpairment]
abstract = true
*.radioMedium.backgroundNoise.typename = "DimensionalBackgroundNoise"
*.radioMedium.backgroundNoise.power = -65dBm
*.radioMedium.backgroundNoise.frequencyGains = "left 5.16GHz -60dB linear 5.19995GHz -60dB linear 5.20005GHz 0dB linear 5.21995GHz 0dB linear 5.22005GHz -60dB linear 5.24GHz -60dB right"

[Config Upper20MHzImpairment]
abstract = true
*.radioMedium.backgroundNoise.typename = "DimensionalBackgroundNoise"
*.radioMedium.backgroundNoise.power = -65dBm
*.radioMedium.backgroundNoise.frequencyGains = "left 5.16GHz -60dB linear 5.21995GHz -60dB linear 5.22005GHz 0dB linear 5.24GHz 0dB right"

[Config NarrowbandLegacyInterferer]
abstract = true
description = "Abstract 20 MHz legacy interferer on the second slice of the HE BSS's 80 MHz channel"
*.hasInterferer = true
*.configurator.config = xmldoc("configurator.xml")
*.interferer.**.rng-0 = 1
*.interferer.mobility.typename = "StationaryMobility"
*.interferer.mobility.initialX = 365m
*.interferer.mobility.initialY = 235m
*.interferer.mobility.initFromDisplayString = false
*.interferer.wlan[*].opMode = "a"
*.interferer.**.bandName = "5 GHz (20 MHz)"
*.interferer.**.channelNumber = 9
*.interferer.wlan[*].radio.transmitter.power = 10mW
*.interferer.wlan[*].bitrate = 54Mbps
*.interferer.wlan[*].mac.hcf.typename = "Hcf"
*.interferer.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
*.interferer.ipv4.ip.limitedBroadcast = true
*.interferer.numApps = 1
*.interferer.app[0].typename = "UdpBasicApp"
*.interferer.app[0].destAddresses = "255.255.255.255"
*.interferer.app[0].receiveBroadcast = true
*.interferer.app[0].destPort = 5000
*.interferer.app[0].messageLength = 1000B
*.interferer.app[0].sendInterval = 1ms
*.interferer.app[0].startTime = 0.3s

[Config CochannelAxInterferer]
abstract = true
description = "Abstract cochannel 80 MHz 802.11ax interferer compatible with the TGax matrix channel"
*.hasInterferer = true
*.configurator.config = xmldoc("configurator.xml")
*.interferer.**.rng-0 = 1
*.interferer.mobility.typename = "StationaryMobility"
*.interferer.mobility.initialX = 365m
*.interferer.mobility.initialY = 235m
*.interferer.mobility.initFromDisplayString = false
*.interferer.wlan[*].opMode = "ax"
*.interferer.**.bandName = "5 GHz (80 MHz)"
*.interferer.**.centerFrequency = 5.2GHz
*.interferer.**.channelNumber = 2
*.interferer.wlan[*].radio.receiver.bandwidth = 80MHz
*.interferer.wlan[*].radio.antenna.numAntennas = 1
*.interferer.wlan[*].radio.transmitter.power = 1mW
*.interferer.wlan[*].bitrate = 61.25Mbps
*.interferer.wlan[*].mac.hcf.typename = "Hcf"
*.interferer.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
*.interferer.ipv4.ip.limitedBroadcast = true
*.interferer.numApps = 1
*.interferer.app[0].typename = "UdpBasicApp"
*.interferer.app[0].destAddresses = "255.255.255.255"
*.interferer.app[0].receiveBroadcast = true
*.interferer.app[0].destPort = 5000
*.interferer.app[0].messageLength = 1000B
*.interferer.app[0].sendInterval = 1ms
*.interferer.app[0].startTime = 0.3s

# ---------------------------------------------------------------------------
# Experiment 1: flat-channel sanity check
# ---------------------------------------------------------------------------
[Config FlatChannelOFDMA]
extends = Ofdma
description = "Flat 80 MHz dimensional channel, HE DL OFDMA reference"

[Config FlatChannelSU]
extends = Su
description = "Flat 80 MHz dimensional channel, matched HE SU reference"

[Config TwentyMHzFlatOFDMA]
extends = Ofdma, TwentyMHzBase
description = "Flat 20 MHz dimensional channel, four-user HE OFDMA reference"

[Config TwentyMHzFlatSU]
extends = Su, TwentyMHzBase
description = "Flat 20 MHz dimensional channel, matched HE SU reference"

[Config FortyMHzFlatOFDMA]
extends = Ofdma, FortyMHzBase
description = "Flat 40 MHz dimensional channel, four-user HE OFDMA reference"

[Config FortyMHzFlatSU]
extends = Su, FortyMHzBase
description = "Flat 40 MHz dimensional channel, matched HE SU reference"

[Config TgaxModelBOFDMA]
extends = Ofdma, TgaxIndoorModelB80MHz
description = "Static reciprocal TGax indoor Model B SISO channel with HE DL OFDMA and the NIST error model"

[Config TgaxModelBSU]
extends = Su, TgaxIndoorModelB80MHz
description = "Static reciprocal TGax indoor Model B SISO channel with matched HE SU and the NIST error model"

[Config TgaxModelBRbirOFDMA]
extends = Ofdma, TgaxIndoorModelB80MHz, TgaxRbir
description = "Static reciprocal TGax indoor Model B SISO channel with HE DL OFDMA and calibrated RBIR"

[Config TgaxModelBAmbientDopplerOFDMA]
extends = Ofdma, TgaxIndoorModelB80MHz, TgaxStationaryAmbientDoppler
description = "Time-varying reciprocal TGax indoor Model B SISO channel with TGac stationary ambient Doppler"

[Config TgaxModelBSimoMrcOFDMA]
extends = Ofdma, TgaxIndoorModelB80MHz, TgaxSelectedAntennaMrc
description = "Static reciprocal TGax indoor Model B matrix channel with selected-antenna transmission and receive-side MRC"

[Config TgaxModelBSimoLmmseInterferenceOFDMA]
extends = Ofdma, TgaxIndoorModelB80MHz, TgaxSelectedAntennaLmmse, CochannelAxInterferer
description = "Static reciprocal TGax indoor Model B matrix channel with L-MMSE combining under cochannel 802.11ax interference"

# ---------------------------------------------------------------------------
# Experiment 2: move one bad 20 MHz slice across the 80 MHz channel
# ---------------------------------------------------------------------------
[Config Lower20MHzNotchOFDMA]
extends = Ofdma, Lower20MHzImpairment
description = "HE OFDMA with the lowest 20 MHz slice impaired"

[Config Lower20MHzNotchSU]
extends = Su, Lower20MHzImpairment
description = "HE SU with the lowest 20 MHz slice impaired"

[Config MiddleLower20MHzNotchOFDMA]
extends = Ofdma, MiddleLower20MHzImpairment
description = "HE OFDMA with the second 20 MHz slice impaired"

[Config MiddleLower20MHzNotchSU]
extends = Su, MiddleLower20MHzImpairment
description = "HE SU with the second 20 MHz slice impaired"

[Config MiddleUpper20MHzNotchOFDMA]
extends = Ofdma, MiddleUpper20MHzImpairment
description = "HE OFDMA with the third 20 MHz slice impaired"

[Config MiddleUpper20MHzNotchSU]
extends = Su, MiddleUpper20MHzImpairment
description = "HE SU with the third 20 MHz slice impaired"

[Config Upper20MHzNotchOFDMA]
extends = Ofdma, Upper20MHzImpairment
description = "HE OFDMA with the highest 20 MHz slice impaired"

[Config Upper20MHzNotchSU]
extends = Su, Upper20MHzImpairment
description = "HE SU with the highest 20 MHz slice impaired"

# A legacy 20 MHz transmission is offset from the HE BSS so that it overlaps
# only part of the BSS channel. The dimensional model retains that overlap;
# scalar power models cannot represent which HE RUs are affected.
[Config FortyMHzLowerHalfOFDMA]
extends = Ofdma, FortyMHzBase, NarrowbandLegacyInterferer
description = "40 MHz HE OFDMA with legacy interference covering only the lower 20 MHz half"
*.interferer.**.bandName = "5 GHz (20 MHz)"
*.interferer.**.channelNumber = 8
*.interferer.wlan[*].bitrate = 54Mbps
*.interferer.app[0].sendInterval = exponential(0.5ms)

[Config FortyMHzLowerHalfSU]
extends = Su, FortyMHzBase, NarrowbandLegacyInterferer
description = "Matched 40 MHz HE SU reference with legacy interference on the lower 20 MHz half"
*.interferer.**.bandName = "5 GHz (20 MHz)"
*.interferer.**.channelNumber = 8
*.interferer.wlan[*].bitrate = 54Mbps
*.interferer.app[0].sendInterval = exponential(0.5ms)

[Config FortyMHzSilentInterfererOFDMA]
extends = Ofdma, FortyMHzBase, NarrowbandLegacyInterferer
description = "Matched clean OFDMA control: the lower-half interferer exists but starts after the simulation"
*.interferer.**.bandName = "5 GHz (20 MHz)"
*.interferer.**.channelNumber = 8
*.interferer.wlan[*].bitrate = 54Mbps
*.interferer.app[0].sendInterval = exponential(0.5ms)
*.interferer.app[0].startTime = 10s

[Config FortyMHzSilentInterfererSU]
extends = Su, FortyMHzBase, NarrowbandLegacyInterferer
description = "Matched clean SU control: the lower-half interferer exists but starts after the simulation"
*.interferer.**.bandName = "5 GHz (20 MHz)"
*.interferer.**.channelNumber = 8
*.interferer.wlan[*].bitrate = 54Mbps
*.interferer.app[0].sendInterval = exponential(0.5ms)
*.interferer.app[0].startTime = 10s

[Config FortyMHzUpperHalfOFDMA]
extends = Ofdma, FortyMHzBase, NarrowbandLegacyInterferer
description = "40 MHz HE OFDMA with legacy interference covering only the upper 20 MHz half"
*.interferer.**.bandName = "5 GHz (20 MHz)"
*.interferer.**.channelNumber = 9
*.interferer.wlan[*].bitrate = 54Mbps
*.interferer.app[0].sendInterval = exponential(0.5ms)

[Config FortyMHzUpperHalfSU]
extends = Su, FortyMHzBase, NarrowbandLegacyInterferer
description = "Matched 40 MHz HE SU reference with legacy interference on the upper 20 MHz half"
*.interferer.**.bandName = "5 GHz (20 MHz)"
*.interferer.**.channelNumber = 9
*.interferer.wlan[*].bitrate = 54Mbps
*.interferer.app[0].sendInterval = exponential(0.5ms)

# ---------------------------------------------------------------------------
# Experiment 3: impairment severity sweep
# ---------------------------------------------------------------------------
[Config NotchDepthSweepOFDMA]
extends = Ofdma, MiddleLower20MHzImpairment
description = "HE OFDMA sweep from a mild to a severe frequency-selective impairment"
*.radioMedium.backgroundNoise.power = ${notchPower=-110dBm,-90dBm,-75dBm,-65dBm}

[Config NotchDepthSweepSU]
extends = Su, MiddleLower20MHzImpairment
description = "Matched HE SU sweep from a mild to a severe frequency-selective impairment"
*.radioMedium.backgroundNoise.power = ${notchPower=-110dBm,-90dBm,-75dBm,-65dBm}

# ---------------------------------------------------------------------------
# Experiment 4: 802.11ax preamble puncturing
# ---------------------------------------------------------------------------
[Config PuncturingCleanOFDMA]
extends = PuncturingScheduler
description = "Clean-channel reference using the same backlog scheduler as the puncturing study"

[Config PuncturingImpairedUnpunctured]
extends = PuncturingScheduler, MiddleLower20MHzImpairment
description = "One bad secondary 20 MHz slice, but the AP still allocates the full 80 MHz"

[Config PuncturingImpairedPunctured]
extends = PuncturingScheduler, MiddleLower20MHzImpairment
description = "The AP punctures the bad second 20 MHz slice and allocates RUs only in the other 60 MHz"
**.ap.wlan[*].mac.hcf.hePreamblePuncturing = "0100"

# ---------------------------------------------------------------------------
# Experiment 5: a real narrowband interferer, persistent or transient
# ---------------------------------------------------------------------------
[Config NarrowbandInterferenceOFDMA]
extends = PuncturingScheduler, NarrowbandLegacyInterferer
description = "Persistent legacy 20 MHz interference inside the HE BSS's 80 MHz channel; no puncturing"

[Config NarrowbandInterferenceSU]
extends = Su, NarrowbandLegacyInterferer
description = "Matched HE SU transmission spans the whole 80 MHz channel under persistent 20 MHz interference"

[Config NarrowbandInterferencePunctured]
extends = PuncturingScheduler, NarrowbandLegacyInterferer
description = "Persistent legacy 20 MHz interference; HE punctures the affected secondary slice"
**.ap.wlan[*].mac.hcf.hePreamblePuncturing = "0100"

[Config TransientInterferenceOFDMA]
extends = PuncturingScheduler, NarrowbandLegacyInterferer
description = "The legacy 20 MHz interferer is active only from 0.5 to 0.85 s; no puncturing"
*.interferer.app[0].startTime = 0.5s
*.interferer.app[0].stopTime = 0.85s

[Config TransientInterferenceSU]
extends = Su, NarrowbandLegacyInterferer
description = "Matched HE SU reference with a legacy 20 MHz interferer active from 0.5 to 0.85 s"
*.interferer.app[0].startTime = 0.5s
*.interferer.app[0].stopTime = 0.85s

[Config TransientInterferenceStaticPuncturing]
extends = PuncturingScheduler, NarrowbandLegacyInterferer
description = "The transient interferer's slice is always punctured, trading clean-period capacity for robustness"
*.interferer.app[0].startTime = 0.5s
*.interferer.app[0].stopTime = 0.85s
**.ap.wlan[*].mac.hcf.hePreamblePuncturing = "0100"

[Config TransientInterferenceScriptedDynamicPuncturing]
extends = PuncturingScheduler, NarrowbandLegacyInterferer
description = "INET scripted control punctures only while the transient 20 MHz interferer is active"
*.interferer.app[0].startTime = 0.5s
*.interferer.app[0].stopTime = 0.85s
**.ap.wlan[*].mac.hcf.dynamicHePreamblePuncturing = "0100"
**.ap.wlan[*].mac.hcf.dynamicHePreamblePuncturingStart = 0.5s
**.ap.wlan[*].mac.hcf.dynamicHePreamblePuncturingEnd = 0.85s
