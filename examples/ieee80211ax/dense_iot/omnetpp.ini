[General]
network = inet.examples.ieee80211ax.dense_iot.DenseIotNetwork
sim-time-limit = 120s
warmup-period = 20s
repeat = 5
seed-set = ${repetition}
num-rngs = 4
result-dir = results

# Three dense-BSS sizes. Each runnable configuration therefore contains
# 3 sizes x 5 independent repetitions = 15 runs.
*.numStations = ${numStations=128,256,512}

# Geometry and propagation. Random placement in this square produces a broad
# distance/SNR distribution while keeping every run reproducible from its seed.
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 500m
**.constraintAreaMaxY = 500m
*.ap.mobility.typename = "StationaryMobility"
*.ap.mobility.initFromDisplayString = false
*.sta[*].mobility.typename = "StationaryMobility"
*.sta[*].mobility.initFromDisplayString = false
*.ap.mobility.initialX = 250m
*.ap.mobility.initialY = 250m
*.sta[*].mobility.initialX = uniform(70m,430m,1)
*.sta[*].mobility.initialY = uniform(70m,430m,1)

# One explicitly associated infrastructure BSS.
**.arp.typename = "GlobalArp"
*.ap.wlan[*].address = "10:00:00:00:00:00"
*.sta[*].wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:00"
*.sta[*].wlan[*].agent.channelsToScan = "0"
# Spread association/TWT setup attempts across fifteen seconds instead of turning
# initialization into a synchronized 512-STA management-frame burst.
*.sta[*].wlan[*].agent.startingTime = uniform(0s,15s,2)
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

# Matched 5 GHz, 20 MHz radios. The treatment and baseline use
# the same topology, channel, transmit power, sensitivity, and energy model.
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].radio.transmitter.power = 20mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
**.wlan[*].radio.antenna.numAntennas = 1

# QoS/BE traffic and Block Ack are available in both technologies. Port 80 is
# classified as best effort by ExampleQosClassifier.
**.wlan[*].mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.isBlockAckSupported = true
**.wlan[*].mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 512B
**.wlan[*].mac.hcf.originatorBlockAckAgreementPolicy.addbaFailureTimeout = 10ms

# A common radio-state energy model. Capacity is deliberately large so energy
# depletion cannot stop a station; analysis uses initial minus residual energy.
*.sta[*].hasStatus = true
*.sta[*].energyStorage.typename = "SimpleEpEnergyStorage"
*.sta[*].energyStorage.nominalCapacity = 1000J
*.sta[*].energyStorage.initialCapacity = 1000J
*.sta[*].wlan[*].energySourceModule = "^.energyStorage"
*.sta[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"
*.sta[*].wlan[*].radio.energyConsumer.offPowerConsumption = 0mW
*.sta[*].wlan[*].radio.energyConsumer.sleepPowerConsumption = 1mW
*.sta[*].wlan[*].radio.energyConsumer.idlePowerConsumption = 20mW
*.sta[*].wlan[*].radio.energyConsumer.rxPowerConsumption = 100mW
*.sta[*].wlan[*].radio.energyConsumer.txPowerConsumption = 200mW

# Keep the large campaign compact: retain only application delivery/delay,
# final station energy, TWT state totals, selected rates, and OFDMA counters.
**.app[*].packetReceived:count.scalar-recording = true
**.app[*].packetReceived:sum(packetBytes).scalar-recording = true
**.app[*].endToEndDelay:vector.vector-recording = true
*.sta[*].energyStorage.residualEnergyCapacity:last.scalar-recording = true
*.sta[*].wlan[*].twt.twtAgreementCount.scalar-recording = true
*.sta[*].wlan[*].twt.twtAwakeTime.scalar-recording = true
*.sta[*].wlan[*].twt.twtSleepTime.scalar-recording = true
**.scalar-recording = false
**.vector-recording = false

[Config Ax]
abstract = true
description = "802.11ax treatment: HE rate adaptation, DL/UL OFDMA, and individual unannounced TWT."
**.opMode = "ax"
**.wlan[*].mac.hcf.typename = "HeHcf"
**.wlan[*].mac.hcf.rateControl.typename = "HeMinstrelRateControl"
**.wlan[*].mac.hcf.rateControl.minMcs = 0
**.wlan[*].mac.hcf.rateControl.maxMcs = 11
**.wlan[*].mac.hcf.rateControl.maxNss = 1
**.wlan[*].mac.hcf.rateControl.heRateSelectedMcs:vector.vector-recording = true
**.wlan[*].mac.hcf.rateSelection.mgmtFrameBitrate = 7.3125Mbps
*.ap.wlan[*].radio.heStaId:vector.vector-recording = true
*.ap.wlan[*].radio.heRuToneSize:vector.vector-recording = true

# Downlink OFDMA uses per-peer link estimates/rate control. Uplink OFDMA uses
# scheduled RUs when BSR state is known and UORA RUs for discovery/contention.
*.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerBacklogBased"
*.ap.wlan[*].mac.hcf.dlScheduler.heRateControlModule = "^.rateControl"
*.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 8
# Sequential BAR/Block Ack retains DL OFDMA while avoiding an HE-TB response
# mode that would require more spatial streams than these one-antenna devices.
*.ap.wlan[*].mac.hcf.dlMuAckMethod = "sequentialBar"
*.ap.wlan[*].mac.hcf.enableUlMuOfdma = true
*.ap.wlan[*].mac.hcf.ulScheduler.typename = "HeUlSchedulerBacklogBased"
*.ap.wlan[*].mac.hcf.ulScheduler.heRateControlModule = "^.rateControl"
*.ap.wlan[*].mac.hcf.ulScheduler.maxMuStations = 8
*.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 2
*.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 4
# Poll often enough to intersect the staggered 5 ms service periods, but avoid
# spending the channel on an effectively continuous stream of empty BSRP
# exchanges while most unannounced-TWT stations are asleep.
*.ap.wlan[*].mac.hcf.ulTriggerPolicy.minimumTriggerInterval = 10ms
*.ap.wlan[*].mac.hcf.ulCoordinator.heUlBasicTriggerSent:count.scalar-recording = true
*.ap.wlan[*].mac.hcf.ulCoordinator.heUlBsrpTriggerSent:count.scalar-recording = true
*.ap.wlan[*].mac.hcf.ulCoordinator.heUlScheduledUsers:sum.scalar-recording = true
*.ap.wlan[*].mac.hcf.ulCoordinator.heUlRandomAccessSuccess:count.scalar-recording = true

# Full management exchanges negotiate one implicit, individual, unannounced
# agreement per STA. Random offsets distribute 5 ms service periods across the
# 100 ms interval instead of forcing all devices awake at once.
*.ap.wlan[*].mgmt.typename = "Ieee80211TwtExampleMgmtAp"
*.sta[*].wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.sta[*].wlan[*].agent.typename = "Ieee80211TwtExampleAgent"
**.wlan[*].mib.heTwtRequester = true
**.wlan[*].mib.heTwtResponder = true
**.wlan[*].twt.typename = "Ieee80211TwtManager"
**.wlan[*].twt.enabled = true
*.sta[*].wlan[*].agent.requestBroadcast = false
*.sta[*].wlan[*].agent.announced = false
*.sta[*].wlan[*].agent.implicit = true
*.sta[*].wlan[*].agent.wakeInterval = 100ms
*.sta[*].wlan[*].agent.wakeDuration = 5ms
*.sta[*].wlan[*].agent.firstWakeOffset = 20ms
*.sta[*].wlan[*].agent.twtSetupRetryInterval = 100ms
*.sta[*].wlan[*].agent.twtSetupMaxAttempts = 50
*.ap.wlan[*].twt.defaultWakeInterval = 100ms
*.ap.wlan[*].twt.defaultWakeDuration = 5ms
*.ap.wlan[*].twt.firstWakeOffset = 20ms

[Config Ac]
abstract = true
description = "Matched 802.11ac baseline: single-user EDCA and no TWT."
**.opMode = "ac"
**.wlan[*].mac.hcf.typename = "Hcf"
**.wlan[*].mac.hcf.rateControl.typename = "AarfRateControl"
**.wlan[*].mac.hcf.rateControl.maxNss = 1
**.wlan[*].mac.hcf.rateControl.datarateChanged:vector.vector-recording = true
**.wlan[*].mib.vhtMaxNss = 1
**.wlan[*].mac.hcf.rateSelection.mgmtFrameBitrate = 6.5Mbps
*.ap.wlan[*].mgmt.typename = "Ieee80211MgmtAp"
*.sta[*].wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.sta[*].wlan[*].agent.typename = "Ieee80211AgentSta"
**.wlan[*].twt.typename = ""

[Config UlTraffic]
abstract = true
description = "Each STA sends one 100-byte UDP packet per second to the server."
*.server.numApps = 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 80
*.sta[*].numApps = 1
*.sta[*].app[0].typename = "UdpBasicApp"
*.sta[*].app[0].packetName = "iot-ul-" + string(parentIndex())
*.sta[*].app[0].destAddresses = "server"
*.sta[*].app[0].destPort = 80
*.sta[*].app[0].messageLength = 100B
*.sta[*].app[0].sendInterval = 1s
*.sta[*].app[0].startTime = uniform(10s,11s,3)
*.sta[*].app[0].stopTime = 120s

[Config DlTraffic]
abstract = true
description = "The server sends one 100-byte UDP packet per second to every STA."
*.server.numApps = ${numStations} + 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 80
*.server.app[1..].typename = "UdpBasicApp"
*.server.app[1..].packetName = "iot-dl-" + string(index - 1)
*.server.app[1..].destAddresses = "sta[" + string(index - 1) + "]"
*.server.app[1..].destPort = 80
*.server.app[1..].messageLength = 100B
*.server.app[1..].sendInterval = 1s
*.server.app[1..].startTime = uniform(10s,11s,3)
*.server.app[1..].stopTime = 120s
*.sta[*].numApps = 1
*.sta[*].app[0].typename = "UdpSink"
*.sta[*].app[0].localPort = 80

[Config MixedTraffic]
abstract = true
description = "Each STA sends every second; the server sends to each STA every ten seconds."
*.server.numApps = ${numStations} + 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 80
*.server.app[1..].typename = "UdpBasicApp"
*.server.app[1..].packetName = "iot-dl-" + string(index - 1)
*.server.app[1..].destAddresses = "sta[" + string(index - 1) + "]"
*.server.app[1..].destPort = 80
*.server.app[1..].messageLength = 100B
*.server.app[1..].sendInterval = 10s
*.server.app[1..].startTime = uniform(10s,20s,3)
*.server.app[1..].stopTime = 120s
*.sta[*].numApps = 2
*.sta[*].app[0].typename = "UdpBasicApp"
*.sta[*].app[0].packetName = "iot-ul-" + string(parentIndex())
*.sta[*].app[0].destAddresses = "server"
*.sta[*].app[0].destPort = 80
*.sta[*].app[0].messageLength = 100B
*.sta[*].app[0].sendInterval = 1s
*.sta[*].app[0].startTime = uniform(10s,11s,3)
*.sta[*].app[0].stopTime = 120s
*.sta[*].app[1].typename = "UdpSink"
*.sta[*].app[1].localPort = 80

[Config AxUl]
extends = Ax, UlTraffic

[Config AcUl]
extends = Ac, UlTraffic

[Config AxDl]
extends = Ax, DlTraffic
# There is no uplink application load in this scenario. Disable empty Basic/
# BSRP trigger polling; downlink OFDMA remains enabled through the scheduler.
*.ap.wlan[*].mac.hcf.enableUlMuOfdma = false

[Config AcDl]
extends = Ac, DlTraffic

[Config AxMixed]
extends = Ax, MixedTraffic

[Config AcMixed]
extends = Ac, MixedTraffic
