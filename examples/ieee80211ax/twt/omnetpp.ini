[General]
network = inet.examples.ieee80211ax.twt.TwtRegression
sim-time-limit = 100s
seed-set = 20260623
**.radioMedium.sameTransmissionStartTimeCheck = "warning"

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 600m
**.constraintAreaMaxY = 360m

*.ap.mobility.typename = "StationaryMobility"
*.ap.mobility.initialX = 300m
*.ap.mobility.initialY = 180m

*.sta[*].mobility.typename = "StationaryMobility"
*.sta[0].mobility.initialX = 250m
*.sta[0].mobility.initialY = 150m
*.sta[1].mobility.initialX = 250m
*.sta[1].mobility.initialY = 210m

**.mobility.initFromDisplayString = false

**.arp.typename = "GlobalArp"

**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
*.ap.wlan[*].address = "10:00:00:00:00:00"
*.sta[*].wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:00"
**.wlan[*].mac.qosStation = true
**.wlan[*].mac.hcf.typename = "HeHcf"
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.wlan[*].mib.heTwtRequester = true
**.wlan[*].mib.heTwtResponder = true
**.wlan[*].mib.heBroadcastTwt = true
**.wlan[*].twt.typename = "Ieee80211TwtManager"
**.isBlockAckSupported = true

# Make TWT's power-saving effect measurable instead of inferring it only from
# awake/sleep time.  The battery is intentionally large enough that no node
# shuts down during this comparison; inspect the consumer's consumed-energy
# scalar together with delivery and latency.
*.sta[*].energyStorage.typename = "SimpleEpEnergyStorage"
*.sta[*].hasStatus = true
*.sta[*].energyStorage.nominalCapacity = 100J
*.sta[*].energyStorage.initialCapacity = 100J
*.sta[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"

*.server.numApps = 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 5000
*.sta[*].numApps = 1
*.sta[*].app[0].typename = "UdpBasicApp"
*.sta[*].app[0].destAddresses = "server"
*.sta[*].app[0].destPort = 5000
*.sta[*].app[0].messageLength = 200B
*.sta[*].app[0].sendInterval = 2011ms
# Keep the two periodic flows 5 ms apart, and advance their phase by 11 ms in
# each 100 ms TWT cycle. This prevents simultaneous releases and avoids locking
# every packet to the same point in the individual or broadcast TWT schedule.
*.sta[0].app[0].startTime = 10.021s
*.sta[1].app[0].startTime = 10.026s
*.sta[*].app[0].stopTime = 90s

# Baseline and TWT variants keep traffic and seed identical.  Compare
# twtAwakeTime/twtSleepTime, application delivery, and residual energy under
# the same radio energy-consumer configuration.
[Config Baseline]
description = "Identical periodic traffic without TWT; reference for awake time, delivery, and energy when a consumer is installed."
**.wlan[*].twt.enabled = false
*.sta[*].wlan[*].agent.typename = "Ieee80211AgentSta"

[Config IndividualUnannounced]
description = "Individual unannounced TWT agreements with 100 ms wake intervals and 10 ms service periods."
**.wlan[*].twt.enabled = true
*.sta[*].wlan[*].agent.requestBroadcast = false
*.sta[*].wlan[*].agent.announced = false
*.sta[*].wlan[*].agent.wakeInterval = 100ms
*.sta[*].wlan[*].agent.wakeDuration = 10ms
*.ap.wlan[*].twt.defaultWakeInterval = 100ms
*.ap.wlan[*].twt.defaultWakeDuration = 10ms

[Config IndividualAnnounced]
description = "Individual announced TWT agreements; otherwise identical to IndividualUnannounced."
extends = IndividualUnannounced
*.sta[*].wlan[*].agent.announced = true

[Config IndividualUnannounced1ms]
description = "Individual unannounced TWT agreements with 100 ms wake intervals and 1 ms service periods."
extends = IndividualUnannounced
*.sta[*].wlan[*].agent.wakeDuration = 1ms
*.ap.wlan[*].twt.defaultWakeDuration = 1ms

[Config IndividualUnannounced5ms]
description = "Individual unannounced TWT agreements with 100 ms wake intervals and 5 ms service periods."
extends = IndividualUnannounced
*.sta[*].wlan[*].agent.wakeDuration = 5ms
*.ap.wlan[*].twt.defaultWakeDuration = 5ms

[Config IndividualUnannounced50ms]
description = "Individual unannounced TWT agreements with 100 ms wake intervals and 50 ms service periods."
extends = IndividualUnannounced
*.sta[*].wlan[*].agent.wakeDuration = 50ms
*.ap.wlan[*].twt.defaultWakeDuration = 50ms

[Config Broadcast]
description = "A shared broadcast TWT schedule for both stations."
extends = IndividualUnannounced
*.ap.wlan[*].mgmt.createBroadcastSchedule = true
*.ap.wlan[*].mgmt.broadcastId = 1
*.ap.wlan[*].mgmt.wakeInterval = 100ms
*.ap.wlan[*].mgmt.wakeDuration = 10ms
*.ap.wlan[*].mgmt.firstWakeOffset = 20ms
*.sta[*].wlan[*].agent.requestBroadcast = true
*.sta[*].wlan[*].agent.broadcastId = 1

# --- Energy consumption configurations for TWT comparison ---

[Config EnergyBase]
abstract = true
*.sta[*].energyStorage.typename = "SimpleEpEnergyStorage"
*.sta[*].energyStorage.nominalCapacity = 1000J
*.sta[*].energyStorage.initialCapacity = 1000J
*.sta[*].wlan[*].radio.energySourceModule = "^.^.energyStorage"
*.sta[*].wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"
*.sta[*].wlan[*].radio.energyConsumer.offPowerConsumption = 0mW
*.sta[*].wlan[*].radio.energyConsumer.sleepPowerConsumption = 1mW
*.sta[*].wlan[*].radio.energyConsumer.idlePowerConsumption = 20mW
*.sta[*].wlan[*].radio.energyConsumer.rxPowerConsumption = 100mW
*.sta[*].wlan[*].radio.energyConsumer.txPowerConsumption = 200mW

[Config BaselineEnergy]
description = "Energy measurement for Baseline: No TWT (radio remains in idle/rx state)."
extends = Baseline, EnergyBase

[Config TwtEnergySaving]
description = "Energy measurement for Individual TWT: Radio transitions to sleep state during sleep intervals, significantly reducing power draw."
extends = IndividualUnannounced, EnergyBase
