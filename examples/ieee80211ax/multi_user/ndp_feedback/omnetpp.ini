include ../../ul_ofdma/omnetpp.ini

[General]
# HE TB NDP Feedback Report responses are preamble-only PPDUs with no PSDU.
# Enable recording of zero-byte 802.11 frames so PcapRecorder writes the
# Radiotap header (channel, signal, power) for these NDPs in the capture file.
**.pcapRecorder.recordEmptyPackets = true
