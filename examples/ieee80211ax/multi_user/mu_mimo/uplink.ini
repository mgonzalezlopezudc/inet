include ../../ul_ofdma/omnetpp.ini

# Saturate the three uplinks so simultaneous spatial reuse, rather than offered
# load, limits delivery in both UlMuMimo and EdcaBaseline. The 1.5 ms HE-TB
# budget fits the VO TXOP and lets a full-bandwidth MCS-0 allocation carry data
# while remaining well below the 5.484 ms PPDU limit.
[Config UlMuMimo]
**.host[*].app[1].sendInterval = 0.5ms
**.ap.wlan[*].mac.hcf.maxHeTbPpduDuration = 1.5ms

[Config EdcaBaseline]
**.host[*].app[1].sendInterval = 0.5ms
