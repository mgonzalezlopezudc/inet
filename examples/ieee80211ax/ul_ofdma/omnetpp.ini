[General]
network = inet.examples.ieee80211ax.ul_ofdma.Lan80211AxUlOfdma
sim-time-limit = 2s

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 50m
**.constraintAreaMaxY = 50m
**.constraintAreaMaxZ = 0m
**.mobility.typename = "StationaryMobility"
**.mobility.initFromDisplayString = false
**.mobility.updateFromDisplayString = false

**.ap.mobility.initialX = 25m
**.ap.mobility.initialY = 25m
**.host[0].mobility.initialX = 20m
**.host[0].mobility.initialY = 25m
**.host[1].mobility.initialX = 25m
**.host[1].mobility.initialY = 20m
**.host[2].mobility.initialX = 30m
**.host[2].mobility.initialY = 25m

**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].bitrate = 14.625Mbps
**.wlan[*].radio.transmitter.power = 10mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.wlan[*].mac.hcf.enableUlMuOfdma = true
**.ap.wlan[*].mac.hcf.ulScheduler.typename = "HeUlSchedulerBacklogBased"
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 1
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 3
**.isBlockAckSupported = true
**.msduAggregationPolicy.typename = ""
**.mpduAggregationPolicy.typename = "VhtMpduAggregationPolicy"
**.maxAmpduLengthExponent = 0

**.server.numApps = 1
**.server.app[0].typename = "UdpSink"
**.server.app[0].localPort = 5000

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].packetName = "UdpBasicApp-" + string(parentIndex())
**.host[*].app[0].destAddresses = "server"
**.host[*].app[0].destPort = 5000
**.host[*].app[0].messageLength = 1000B
**.host[*].app[0].sendInterval = 5ms
**.host[*].app[0].startTime = 0.2s

[Config ScheduledOnly]
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 0
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 0

[Config MixedUora]
description = "Mixed scheduled and random-access RUs under the default three-station load."
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 1
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 3
**.ap.wlan[*].mac.hcf.ulScheduler.maxMuStations = 2

[Config EqualRus]
description = "Scheduled UL OFDMA with equal-sized RUs."
**.ap.wlan[*].mac.hcf.ulScheduler.typename = "HeUlSchedulerEqualSizedRUs"

[Config UlMuMimo]
description = "Full-bandwidth HE UL MU-MIMO: three capable STAs share one 242-tone RU using separate spatial streams."
extends = ScheduledOnly
**.ap.wlan[*].mib.heFullBandwidthUlMuMimo = true
**.host[*].wlan[*].mib.heFullBandwidthUlMuMimo = true
**.ap.wlan[*].mac.hcf.enableUlMuMimo = true
**.ap.wlan[*].radio.antenna.numAntennas = 4

[Config OperatingModeIndication]
description = "A non-AP HE STA sends an OM Control update selecting RX NSS 2 and disabling UL MU operation."
extends = ScheduledOnly
**.ap.wlan[*].mib.heOmControl = true
**.host[*].wlan[*].mib.heOmControl = true
**.wlan[*].mib.heTwoNav = true
**.host[0].wlan[*].mac.hcf.sendOperatingModeIndication = true
**.host[0].wlan[*].mac.hcf.operatingModeRxNss = 2
**.host[0].wlan[*].mac.hcf.operatingModeChannelWidth = 0
**.host[0].wlan[*].mac.hcf.operatingModeUlMuDisable = true
**.ap.wlan[*].mac.hcf.ulTriggerCheckInterval = 0.5s

[Config DynamicFragmentation]
description = "Negotiated HE level-1 dynamic fragmentation divides 1400-byte QoS MSDUs into approximately 500-byte MPDUs and reassembles them at the AP."
**.ap.wlan[*].mib.heDynamicFragmentationLevel = 1
**.host[*].wlan[*].mib.heDynamicFragmentationLevel = 1
**.host[*].wlan[*].mac.hcf.originatorMacDataService.fragmentationPolicy.typename = "HeDynamicFragmentationPolicy"
**.host[*].wlan[*].mac.hcf.originatorMacDataService.fragmentationPolicy.fragmentationThreshold = 500B
**.host[*].wlan[*].mac.hcf.originatorMacDataService.fragmentationPolicy.requiredLevel = 1
**.host[*].app[0].messageLength = 1400B
**.wlan[*].mac.hcf.enableUlMuOfdma = false

[Config NdpFeedbackReport]
description = "The AP sends NFRP Triggers and capable STAs respond after SIFS with simultaneous MCS-0/BCC HE-TB feedback reports; the AP sends no acknowledgment."
extends = ScheduledOnly
**.wlan[*].mib.heNdpFeedbackReport = true
**.ap.wlan[*].mac.hcf.enableNdpFeedbackReport = true
**.ap.wlan[*].mac.hcf.ulTriggerCheckInterval = 20ms

[Config UoraLightContention]
description = "Eight contending stations with one random-access RU: low offered load exposes UORA admission behavior."
extends = MixedUora
*.numHosts = 8
**.host[*].mobility.initialX = uniform(15m,35m)
**.host[*].mobility.initialY = uniform(15m,35m)
**.host[*].app[0].sendInterval = 12ms
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 1
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 1

[Config UoraHeavyContention]
description = "Eight contending stations with one random-access RU and high offered load; compare collisions, delay, and fairness with UoraLightContention."
extends = UoraLightContention
**.host[*].app[0].sendInterval = 1ms

[Config UoraMoreRandomAccessRus]
description = "Eight high-load stations with three random-access RUs, isolating RU-count effects on UORA contention."
extends = UoraHeavyContention
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 3
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 3

[Config MultiTidBlockAck]
description = "HE Multi-TID Block Ack: AP and stations negotiate Multi-TID Aggregation and transmit voice/video/BE traffic concurrently"
**.ap.wlan[*].mib.heMultiTidAggregationRx = true
**.ap.wlan[*].mib.heMultiTidAggregationTx = true
**.host[*].wlan[*].mib.heMultiTidAggregationRx = true
**.host[*].wlan[*].mib.heMultiTidAggregationTx = true

# Define 2 UDP applications on each host to generate Multi-TID traffic (TID 0 and TID 6)
**.host[*].numApps = 2
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].packetName = "UdpBasic-TID0-" + string(parentIndex())
**.host[*].app[0].destAddresses = "server"
**.host[*].app[0].destPort = 5000     # TID 0 (Best Effort)
**.host[*].app[0].messageLength = 1000B
**.host[*].app[0].sendInterval = 5ms
**.host[*].app[0].startTime = 0.2s

**.host[*].app[1].typename = "UdpBasicApp"
**.host[*].app[1].packetName = "UdpBasic-TID6-" + string(parentIndex())
**.host[*].app[1].destAddresses = "server"
**.host[*].app[1].destPort = 5001     # TID 6 (Voice / high priority)
**.host[*].app[1].messageLength = 200B
**.host[*].app[1].sendInterval = 10ms
**.host[*].app[1].startTime = 0.25s

# Configure AP server to listen on both ports
**.server.numApps = 2
**.server.app[*].typename = "UdpSink"
**.server.app[0].localPort = 5000
**.server.app[1].localPort = 5001
