[General]
network = inet.examples.ieee80211ax.bss_coloring.BssColoringNetwork
sim-time-limit = 1s

# Position coordinates
**.ap1.mobility.typename = "StationaryMobility"
**.ap1.mobility.initialX = 200m
**.ap1.mobility.initialY = 250m

**.sta1[0].mobility.typename = "StationaryMobility"
**.sta1[0].mobility.initialX = 170m
**.sta1[0].mobility.initialY = 240m

**.sta1[1].mobility.typename = "StationaryMobility"
**.sta1[1].mobility.initialX = 170m
**.sta1[1].mobility.initialY = 260m

**.ap2.mobility.typename = "StationaryMobility"
**.ap2.mobility.initialX = 400m
**.ap2.mobility.initialY = 250m

**.sta2[0].mobility.typename = "StationaryMobility"
**.sta2[0].mobility.initialX = 430m
**.sta2[0].mobility.initialY = 240m

**.sta2[1].mobility.typename = "StationaryMobility"
**.sta2[1].mobility.initialX = 430m
**.sta2[1].mobility.initialY = 260m

**.mobility.initFromDisplayString = false

# IP addressing and direct association setup
*.ap1.wlan[*].address = "10:00:00:00:00:01"
*.sta1[*].wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:01"

*.ap2.wlan[*].address = "10:00:00:00:00:02"
*.sta2[*].wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:02"

**.arp.typename = "GlobalArp"

# All radios need the local BSS color for OBSS/PD classification.  Setting it
# only on the AP leaves STA receivers at color 0, which disables the decision.
*.ap1.wlan[*].mib.heBssColor = 1
*.sta1[*].wlan[*].mib.heBssColor = 1
*.ap2.wlan[*].mib.heBssColor = 2
*.sta2[*].wlan[*].mib.heBssColor = 2

# 802.11ax HE base physical layer configuration
**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 20MHz
**.wlan[*].radio.transmitter.power = 20mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

# Rate selection: force robust MCS 0 (7.3125 Mbps for HE 20MHz with 3.2us GI) for all frames
**.wlan[*].bitrate = 7.3125Mbps
**.mac.*.rateSelection.mgmtFrameBitrate = 7.3125Mbps
**.mac.*.rateSelection.controlFrameBitrate = 7.3125Mbps
**.mac.*.rateSelection.responseAckFrameBitrate = 7.3125Mbps
**.mac.*.rateSelection.responseBlockAckFrameBitrate = 7.3125Mbps
**.mac.*.rateSelection.dataFrameBitrate = 7.3125Mbps

# Allow concurrent transmissions at the medium
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"
# The 2 ms saturated streams can produce aggregated transmissions longer than
# the generic 10 ms medium-cache default; keep the medium limit above the
# largest modeled PPDU so the campaign reaches its one-second horizon.
*.radioMedium.mediumLimitCache.maxTransmissionDuration = 100ms

# Mac settings (QoS and HE HCF coordination)
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.ap*.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerBacklogBased"
**.ap*.wlan[*].mac.hcf.dlScheduler.maxMuStations = 2

# Block Ack and Aggregation
**.isBlockAckSupported = true
**.wlan[*].mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 2000B

# Display HE MU signal details in Qtenv
**.displayHeMuSignalDetails = true
**.displayHeMuSignalPhyFields = true

# Downlink traffic from server1 to sta1[0] and sta1[1]
*.server1.numApps = 4
# Stage 1: Warmup Trigger (Apps 0-1) to establish ADDBA agreements
*.server1.app[0].typename = "UdpBasicApp"
*.server1.app[0].destAddresses = "sta1[0]"
*.server1.app[0].destPort = 5000
*.server1.app[0].messageLength = 1000B
*.server1.app[0].sendInterval = 1s
*.server1.app[0].startTime = 0.2s
*.server1.app[0].stopTime = 0.25s
*.server1.app[0].packetName = "UdpBasicApp0-Warmup"

*.server1.app[1].typename = "UdpBasicApp"
*.server1.app[1].destAddresses = "sta1[1]"
*.server1.app[1].destPort = 5000
*.server1.app[1].messageLength = 1000B
*.server1.app[1].sendInterval = 1s
*.server1.app[1].startTime = 0.2s
*.server1.app[1].stopTime = 0.25s
*.server1.app[1].packetName = "UdpBasicApp1-Warmup"

# Stage 2: Saturated Data Phase (Apps 2-3)
*.server1.app[2].typename = "UdpBasicApp"
*.server1.app[2].destAddresses = "sta1[0]"
*.server1.app[2].destPort = 5000
*.server1.app[2].messageLength = 1000B
# Add a small amount of jitter so neither BSS wins merely because the two
# traffic generators schedule every packet at exactly the same simulation time.
# The mean offered load still keeps both APs backlogged and makes spatial reuse
# visible without driving the HE Block Ack exchange into a starvation regime.
*.server1.app[2].sendInterval = uniform(1ms, 1.4ms)
*.server1.app[2].startTime = 0.3s
*.server1.app[2].packetName = "UdpBasicApp0"

*.server1.app[3].typename = "UdpBasicApp"
*.server1.app[3].destAddresses = "sta1[1]"
*.server1.app[3].destPort = 5000
*.server1.app[3].messageLength = 1000B
*.server1.app[3].sendInterval = uniform(1ms, 1.4ms)
*.server1.app[3].startTime = 0.3s
*.server1.app[3].packetName = "UdpBasicApp1"

# Downlink traffic from server2 to sta2[0] and sta2[1]
*.server2.numApps = 4
# Stage 1: Warmup Trigger (Apps 0-1) to establish ADDBA agreements
*.server2.app[0].typename = "UdpBasicApp"
*.server2.app[0].destAddresses = "sta2[0]"
*.server2.app[0].destPort = 5000
*.server2.app[0].messageLength = 1000B
*.server2.app[0].sendInterval = 1s
*.server2.app[0].startTime = 0.2s
*.server2.app[0].stopTime = 0.25s
*.server2.app[0].packetName = "UdpBasicApp0-Warmup"

*.server2.app[1].typename = "UdpBasicApp"
*.server2.app[1].destAddresses = "sta2[1]"
*.server2.app[1].destPort = 5000
*.server2.app[1].messageLength = 1000B
*.server2.app[1].sendInterval = 1s
*.server2.app[1].startTime = 0.2s
*.server2.app[1].stopTime = 0.25s
*.server2.app[1].packetName = "UdpBasicApp1-Warmup"

# Stage 2: Saturated Data Phase (Apps 2-3)
*.server2.app[2].typename = "UdpBasicApp"
*.server2.app[2].destAddresses = "sta2[0]"
*.server2.app[2].destPort = 5000
*.server2.app[2].messageLength = 1000B
*.server2.app[2].sendInterval = uniform(1ms, 1.4ms)
*.server2.app[2].startTime = 0.3s
*.server2.app[2].packetName = "UdpBasicApp0"

*.server2.app[3].typename = "UdpBasicApp"
*.server2.app[3].destAddresses = "sta2[1]"
*.server2.app[3].destPort = 5000
*.server2.app[3].messageLength = 1000B
*.server2.app[3].sendInterval = uniform(1ms, 1.4ms)
*.server2.app[3].startTime = 0.3s
*.server2.app[3].packetName = "UdpBasicApp1"

# Sinks
*.sta1[*].numApps = 1
*.sta1[*].app[0].typename = "UdpSink"
*.sta1[*].app[0].localPort = 5000

*.sta2[*].numApps = 1
*.sta2[*].app[0].typename = "UdpSink"
*.sta2[*].app[0].localPort = 5000

# ---------------------------------------------------------------------------
# Config 1: Spatial Reuse (BSS Coloring) Disabled (Overlap / Interference baseline)
# ---------------------------------------------------------------------------
[Config BssColoringDisabled]
description = "Spatial reuse (BSS Coloring) disabled. Both BSSs share the medium and back off for each other."
**.receiver.enableSpatialReuse = false
**.receiver.energyDetection = -82dBm
*.ap1.wlan[*].mib.heBssColor = 1
*.ap2.wlan[*].mib.heBssColor = 2

# ---------------------------------------------------------------------------
# Config 2: Spatial Reuse (BSS Coloring) Enabled (OBSS/PD concurrent transmissions)
# ---------------------------------------------------------------------------
[Config BssColoringEnabled]
description = "Spatial reuse (BSS Coloring) enabled. The nodes can transmit concurrently using OBSS/PD CCA thresholds."
**.receiver.enableSpatialReuse = true
**.receiver.obssPdThreshold = -79dBm
*.ap1.wlan[*].mib.heBssColor = 1
*.ap2.wlan[*].mib.heBssColor = 2

# Threshold sweep: these inherit the same topology and colors so aggregate
# throughput, PER, and fairness can be plotted against the OBSS/PD decision.
[Config ObssPdConservative]
description = "Spatial reuse with a conservative OBSS/PD threshold; fewer concurrent transmissions and lower collision risk."
extends = BssColoringEnabled
**.receiver.obssPdThreshold = -82dBm

[Config ObssPdAggressive]
description = "Spatial reuse with an aggressive OBSS/PD threshold; more concurrency at the cost of potential interference."
extends = BssColoringEnabled
**.receiver.obssPdThreshold = -62dBm

# ---------------------------------------------------------------------------
# Config 3: Spatial Reuse (BSS Coloring) Collision (OBSS/PD fails due to same color)
# ---------------------------------------------------------------------------
[Config BssColoringCollision]
description = "Spatial reuse enabled, but both BSSs use the same color. Spatial reuse fails due to color collision."
extends = BssColoringEnabled
*.ap1.wlan[*].mib.heBssColor = 1
*.sta1[*].wlan[*].mib.heBssColor = 1
*.ap2.wlan[*].mib.heBssColor = 1
*.sta2[*].wlan[*].mib.heBssColor = 1

[Config TwoNav]
description = "HE stations maintain separate intra-BSS and basic NAV timers while two overlapping BSSs contend."
extends = BssColoringEnabled
**.wlan[*].mib.heTwoNav = true
**.rx.intraBssNavChanged.result-recording-modes = +vector
# Add local uplink traffic to sta1[0] to trigger local (Intra-BSS) NAV
*.sta1[0].numApps = 2
*.sta1[0].app[1].typename = "UdpBasicApp"
*.sta1[0].app[1].destAddresses = "server1"
*.sta1[0].app[1].destPort = 5002
*.sta1[0].app[1].messageLength = 1000B
*.sta1[0].app[1].sendInterval = 10ms
*.sta1[0].app[1].startTime = 0.3s
*.server1.numApps = 5
*.server1.app[4].typename = "UdpSink"
*.server1.app[4].localPort = 5002
