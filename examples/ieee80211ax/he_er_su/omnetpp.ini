[General]
network = inet.examples.ieee80211ax.he_er_su.HeErSuNetwork
sim-time-limit = 2s

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 800m
**.constraintAreaMaxY = 360m
**.ap.mobility.typename = "StationaryMobility"
**.edge.mobility.typename = "StationaryMobility"
**.mobility.initFromDisplayString = false

**.ap.mobility.initialX = 390m
**.ap.mobility.initialY = 180m
**.edge.mobility.initialX = 70m
**.edge.mobility.initialY = 180m

**.ap.wlan[*].address = "10:00:00:00:00:00"
**.edge.**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].bitrate = 7.3125Mbps
**.wlan[*].radio.transmitter.power = 10mW
**.wlan[*].radio.receiver.sensitivity = -88dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.isBlockAckSupported = true

**.server.numApps = 1
**.server.app[0].typename = "UdpBasicApp"
**.server.app[0].destAddresses = "edge"
**.server.app[0].destPort = 5000
**.server.app[0].messageLength = 300B
**.server.app[0].sendInterval = 1ms
**.server.app[0].startTime = 0.2s
**.edge.numApps = 1
**.edge.app[0].typename = "UdpSink"
**.edge.app[0].localPort = 5000

[Config HeSu]
description = "Normal HE SU baseline at the cell edge."

[Config HeErSu]
description = "HE Extended Range SU uses duplicated HE-SIG-A and robust MCS/DCM preference."
**.ap.wlan[*].mac.hcf.rateControl.typename = "HeMinstrelRateControl"
**.ap.wlan[*].mac.hcf.rateControl.enableExtendedRangeSu = true
**.ap.wlan[*].mac.hcf.rateControl.preferDcm = true
**.ap.wlan[*].mac.hcf.rateControl.maxMcs = 2
**.ap.wlan[*].mac.hcf.rateSelection.rateControlModule = "^.rateControl"

[Config ErBss]
description = "An ER BSS advertises ER SU reception and sends Beacons and group-addressed frames in 242-tone HE ER SU PPDUs."
extends = HeErSu

# Use the full management exchange so the scenario emits actual Beacon and
# association frames instead of installing an association at initialization.
**.ap.wlan[*].mgmt.typename = "Ieee80211MgmtAp"
**.edge.wlan[*].mgmt.typename = "Ieee80211MgmtSta"
**.edge.wlan[*].agent.typename = "Ieee80211AgentSta"
**.edge.wlan[*].agent.startingTime = 0s
**.edge.wlan[*].agent.channelsToScan = "0"
**.edge.wlan[*].agent.activeScan = false
**.wlan[*].mib.heErBss = true
# Let HE rate control select the ER SU mode for management frames instead of
# the interface-wide fixed bitrate taking precedence in QosRateSelection.
**.ap.wlan[*].mac.hcf.rateSelection.mgmtFrameBitrate = -1bps
**.edge.wlan[*].mac.hcf.rateControl.typename = "HeMinstrelRateControl"
**.edge.wlan[*].mac.hcf.rateControl.enableExtendedRangeSu = true
**.edge.wlan[*].mac.hcf.rateControl.preferDcm = true
**.edge.wlan[*].mac.hcf.rateControl.maxMcs = 2
**.edge.wlan[*].mac.hcf.rateSelection.rateControlModule = "^.rateControl"
**.edge.wlan[*].mac.hcf.rateSelection.mgmtFrameBitrate = -1bps
**.server.app[0].startTime = 0.8s
**.server.app[0].sendInterval = 10ms
**.server.app[0].messageLength = 100B
# Keep this focused ER-BSS example on single MPDUs; Block Ack/control-rate
# robustness is orthogonal and can otherwise build a large slow-rate A-MPDU.
**.isBlockAckSupported = false
