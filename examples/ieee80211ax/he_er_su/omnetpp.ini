[General]
network = inet.examples.ieee80211ax.he_er_su.HeErSuNetwork
sim-time-limit = 2s

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 800m
**.constraintAreaMaxY = 360m
**.ap.mobility.typename = "StationaryMobility"
**.host[0].mobility.typename = "StationaryMobility"
**.mobility.initFromDisplayString = false

**.ap.mobility.initialX = 390m
**.ap.mobility.initialY = 180m
**.host[0].mobility.initialX = 70m
**.host[0].mobility.initialY = 180m

**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[0].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].bitrate = 7.3125Mbps
**.wlan[*].radio.transmitter.power = 10mW
**.wlan[*].radio.receiver.sensitivity = -88dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.isBlockAckSupported = true

**.server.numApps = 1
**.server.app[0].typename = "UdpBasicApp"
**.server.app[0].destAddresses = "host[0]"
**.server.app[0].destPort = 5000
**.server.app[0].messageLength = 300B
**.server.app[0].sendInterval = 1ms
**.server.app[0].startTime = 0.3s
**.host[0].numApps = 1
**.host[0].app[0].typename = "UdpSink"
**.host[0].app[0].localPort = 5000

[Config HeSu]
description = "Normal HE SU baseline at the cell edge."

[Config HeErSu]
description = "HE Extended Range SU uses duplicated HE-SIG-A and robust MCS selection."
**.ap.wlan[*].mac.hcf.rateControl.typename = "HeMinstrelRateControl"
**.ap.wlan[*].mac.hcf.rateControl.enableExtendedRangeSu = true
**.ap.wlan[*].mac.hcf.rateControl.maxMcs = 2
**.ap.wlan[*].mac.hcf.rateSelection.rateControlModule = "^.rateControl"
# The interface-wide bitrate otherwise installs a fixed HE-SU data mode before
# the configured rate-control module is consulted.
**.ap.wlan[*].mac.hcf.rateSelection.dataFrameBitrate = -1bps

[Config ErBss]
description = "An ER BSS advertises ER SU reception and sends Beacons and group-addressed frames in 242-tone HE ER SU PPDUs."
extends = HeErSu

# Use the full management exchange so the scenario emits actual Beacon and
# association frames instead of installing an association at initialization.
*.ap.wlan[*].mgmt.typename = "Ieee80211MgmtAp"
*.host[*].wlan[*].mgmt.typename = "Ieee80211MgmtSta"
*.host[*].wlan[*].agent.typename = "Ieee80211AgentSta"
*.host[*].wlan[*].agent.startingTime = 0s
*.host[*].wlan[*].agent.channelsToScan = "0"
*.host[*].wlan[*].agent.activeScan = false
**.wlan[*].mib.heErBss = true
# Let HE rate control select the ER SU mode for management frames instead of
# the interface-wide fixed bitrate taking precedence in QosRateSelection.
*.ap.wlan[*].mac.hcf.rateSelection.mgmtFrameBitrate = -1bps
*.host[*].wlan[*].mac.hcf.rateControl.typename = "HeMinstrelRateControl"
*.host[*].wlan[*].mac.hcf.rateControl.enableExtendedRangeSu = true
*.host[*].wlan[*].mac.hcf.rateControl.maxMcs = 2
*.host[*].wlan[*].mac.hcf.rateSelection.rateControlModule = "^.rateControl"
*.host[*].wlan[*].mac.hcf.rateSelection.mgmtFrameBitrate = -1bps
**.server.app[0].startTime = 0.8s
**.server.app[0].sendInterval = 10ms
**.server.app[0].messageLength = 100B
# Keep this focused ER-BSS example on single MPDUs; Block Ack/control-rate
# robustness is orthogonal and can otherwise build a large slow-rate A-MPDU.
**.isBlockAckSupported = false

[Config CellBoundaryHeSu]
description = "Low-SNR cell-boundary HE-SU control at 340 m."
extends = HeSu
**.host[0].mobility.initialX = 50m
# Keep reception above the sensitivity and generic SNIR gates so the IEEE
# 802.11 error model, including HE-SIG-A decoding, decides packet success.
*.radioMedium.backgroundNoise.power = -89dBm
**.wlan[*].radio.receiver.sensitivity = -100dBm
**.wlan[*].radio.receiver.snirThreshold = 0dB
# A moderate stream of short single MPDUs makes signaling-field failures
# visible in application delivery without changing the data-field MCS.
**.server.app[0].messageLength = 100B
**.server.app[0].sendInterval = 600us
**.isBlockAckSupported = false

[Config CellBoundaryHeErSu]
description = "Low-SNR cell-boundary HE-ER-SU treatment at 340 m."
extends = CellBoundaryHeSu, HeErSu
# Match the HE-SU control's MCS 0 so the comparison isolates the repeated
# HE-SIG-A field instead of a rate-selection difference.
**.ap.wlan[*].mac.hcf.rateControl.maxMcs = 0

[Config CellBoundary]
description = "Backward-compatible alias for the cell-boundary HE-ER-SU treatment."
extends = CellBoundaryHeErSu
