[General]
network = inet.examples.ieee80211ax.he_rate_adaptation.HeRateAdaptationNetwork
sim-time-limit = 2s

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 700m
**.constraintAreaMaxY = 420m
**.ap.mobility.typename = "StationaryMobility"
**.host[*].mobility.typename = "StationaryMobility"
**.mobility.initFromDisplayString = false

**.ap.mobility.initialX = 320m
**.ap.mobility.initialY = 210m
**.host[0].mobility.initialX = 250m
**.host[0].mobility.initialY = 210m
**.host[1].mobility.initialX = 200m
**.host[1].mobility.initialY = 160m
**.host[2].mobility.initialX = 150m
**.host[2].mobility.initialY = 260m
**.host[3].mobility.initialX = 90m
**.host[3].mobility.initialY = 210m

**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

*.radioMedium.sameTransmissionStartTimeCheck = "ignore"
**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].bitrate = 7.3125Mbps
**.wlan[*].radio.transmitter.power = 20mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerBacklogBased"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 4
**.isBlockAckSupported = true

**.server.numApps = 4
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].destPort = 5000
**.server.app[*].messageLength = 900B
**.server.app[*].sendInterval = 0.35ms
**.server.app[*].startTime = 0.2s
**.server.app[*].stopTime = 1.7s
**.server.app[0].destAddresses = "host[0]"
**.server.app[1].destAddresses = "host[1]"
**.server.app[2].destAddresses = "host[2]"
**.server.app[3].destAddresses = "host[3]"
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpSink"
**.host[*].app[0].localPort = 5000

[Config FixedMcs]
description = "Fixed HE MCS baseline using the configured bitrate and scheduler SNR fallback."

[Config HeMinstrel]
description = "HE Minstrel rate adaptation selects MCS/NSS per peer and feeds the HE DL scheduler."
**.ap.wlan[*].mac.hcf.rateControl.typename = "HeMinstrelRateControl"
**.ap.wlan[*].mac.hcf.rateControl.minMcs = 0
**.ap.wlan[*].mac.hcf.rateControl.maxMcs = 11
**.ap.wlan[*].mac.hcf.rateControl.lookaroundRatio = 0.1
**.ap.wlan[*].mac.hcf.dlScheduler.heRateControlModule = "^.rateControl"

[Config HeMinstrelMobile]
description = "HE Minstrel with a moving edge station, exposing MCS adaptation as path loss changes."
extends = HeMinstrel
**.host[3].mobility.typename = "LinearMobility"
**.host[3].mobility.initialX = 90m
**.host[3].mobility.initialY = 210m
**.host[3].mobility.speed = 40mps
**.host[3].mobility.angle = 0deg

[Config HighCollisionRate]
description = "Collision-Heavy Scenario: High uplink traffic from hosts creates heavy contention and collisions, exercising Minstrel's ability to adapt under packet loss."
extends = HeMinstrel
# Enable uplink UDP traffic on all hosts to collide with downlink traffic
**.host[*].numApps = 2
**.host[*].app[1].typename = "UdpBasicApp"
**.host[*].app[1].destAddresses = "server"
**.host[*].app[1].destPort = 5002
**.host[*].app[1].messageLength = 1000B
**.host[*].app[1].sendInterval = 1ms
**.host[*].app[1].startTime = 0.2s
**.server.numApps = 5  # 4 downlink ports + 1 uplink sink port
**.server.app[4].typename = "UdpSink"
**.server.app[4].localPort = 5002
