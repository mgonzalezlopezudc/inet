[General]
network = inet.examples.ieee80211be.eht_dl_ofdma.Lan80211BeDlOfdma
sim-time-limit = 1.0s

# Area size and placement
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 700m
**.constraintAreaMaxY = 500m

# Stationary coordinates
**.ap.mobility.typename = "StationaryMobility"
**.host[*].mobility.typename = "StationaryMobility"

**.ap.mobility.initialX = 350m
**.ap.mobility.initialY = 250m
**.host[0].mobility.initialX = 250m
**.host[0].mobility.initialY = 200m
**.host[1].mobility.initialX = 250m
**.host[1].mobility.initialY = 300m
**.host[2].mobility.initialX = 450m
**.host[2].mobility.initialY = 200m
**.host[3].mobility.initialX = 450m
**.host[3].mobility.initialY = 300m

**.mobility.initFromDisplayString = false

# Addressing
**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

# Radio configuration
**.radio.transmitter.power = 100mW
**.radio.receiver.sensitivity = -85dBm
**.radio.receiver.snirThreshold = 4dB

# Radio medium setting to allow concurrent OFDMA sub-transmissions
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

# 802.11be EHT configurations
**.opMode = "be"
**.bandName = "6 GHz (320 MHz)"
**.centerFrequency = 6.105GHz
**.channelNumber = 0
**.wlan[*].radio.receiver.bandwidth = 320MHz
**.wlan[*].mib.ehtOperatingChannelWidth = 320MHz
**.wlan[*].mib.ehtDlOfdma = true
**.wlan[*].mib.ehtPreamblePuncturing = true

# Enable QoS classification and multi-user queuing
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"

# Set EHT DL Scheduler
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "EhtDlSchedulerEqualSizedMRUs"
**.ap.wlan[*].mac.hcf.dlScheduler.schedulingFunction = "fBW"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 4

# Aggregation and Block Ack settings
**.isBlockAckSupported = true

# Downlink UDP Application Traffic from Server to Hosts
**.server.numApps = 4
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].destPort = 5000
**.server.app[*].messageLength = 1000B
**.server.app[*].sendInterval = 0.5ms
**.server.app[*].startTime = 0.1s

**.server.app[0].destAddresses = "host[0]"
**.server.app[0].packetName = "UdpCbrApp0"
**.server.app[1].destAddresses = "host[1]"
**.server.app[1].packetName = "UdpCbrApp1"
**.server.app[2].destAddresses = "host[2]"
**.server.app[2].packetName = "UdpCbrApp2"
**.server.app[3].destAddresses = "host[3]"
**.server.app[3].packetName = "UdpCbrApp3"

# Host Applications (UdpSinks)
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpSink"
**.host[*].app[0].localPort = 5000

# Visualization
**.displayHeMuSignalDetails = true
**.heMuSignalLabelMaxUsers = 4
**.displayHeMuSignalPhyFields = true

# ---------------------------------------------------------------------------
# Scenario A: Equal-Sized MRUs
# ---------------------------------------------------------------------------
[Config EqualSizedMRUs]
description = "Downlink OFDMA scheduling 4 users into equal-sized MRUs on a 320 MHz channel."
# No puncturing

# ---------------------------------------------------------------------------
# Scenario B: Punctured MRUs
# ---------------------------------------------------------------------------
[Config PuncturedMRUs]
description = "Downlink OFDMA with preamble puncturing. Simulates interference on secondary subchannels."
# Puncture two secondary 20 MHz subchannels.
# INET hePreamblePuncturing string format uses "1" for punctured, "0" for not punctured.
# 320 MHz = 16 x 20 MHz.
**.ap.wlan[*].mac.hcf.hePreamblePuncturing = "0000 1100 0000 0000"
