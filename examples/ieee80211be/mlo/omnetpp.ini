[General]
network = inet.examples.ieee80211be.mlo.Lan80211BeMlo
sim-time-limit = 1.0s

# Area size and placement
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 700m
**.constraintAreaMaxY = 500m

# Stationary coordinates
**.ap.mobility.typename = "StationaryMobility"
**.host.mobility.typename = "StationaryMobility"

**.ap.mobility.initialX = 350m
**.ap.mobility.initialY = 250m
**.host.mobility.initialX = 250m
**.host.mobility.initialY = 250m

**.mobility.initFromDisplayString = false

# Addressing
**.ap.mldWlan.address = "10:00:00:00:00:00"
**.host.mldWlan.link[0].mgmt.accessPointAddress = "ap%link0"
**.host.mldWlan.link[1].mgmt.accessPointAddress = "ap%link1"
**.arp.typename = "GlobalArp"

# Radio configuration
*.radioMedium5GHz.backgroundNoise.bandwidth = 160MHz
*.radioMedium6GHz.backgroundNoise.bandwidth = 320MHz
**.mldWlan.link[0].radio.radioMediumModule = "radioMedium5GHz"
**.mldWlan.link[1].radio.radioMediumModule = "radioMedium6GHz"
**.radio.transmitter.power = 100mW
**.radio.receiver.sensitivity = -85dBm
**.radio.receiver.snirThreshold = 4dB

# MAC and QoS
**.mac.qosStation = true
**.classifier.typename = "ExampleQosClassifier"
**.isBlockAckSupported = true
**.mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 2000B
**.link[*].mac.hcf.edca.edcaf[*].pendingQueueModule = ""

# Downlink UDP traffic from the server to host
**.server.numApps = 1
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].destPort = 5000
**.server.app[*].messageLength = 1000B
**.server.app[*].sendInterval = 0.01ms # Aggressive traffic to saturate both links
**.server.app[*].startTime = 0.1s
**.server.app[0].destAddresses = "host"
**.server.app[0].packetName = "UdpCbrApp0"

# Host application (UdpSink)
**.host.numApps = 1
**.host.app[0].typename = "UdpSink"
**.host.app[0].localPort = 5000

# Base configuration for the two links
**.opMode = "be"
**.mldWlan.link[0].radio.bandName = "5 GHz (160 MHz)"
**.mldWlan.link[0].radio.centerFrequency = 5.24GHz
**.mldWlan.link[0].radio.channelNumber = 1
**.mldWlan.link[0].radio.receiver.bandwidth = 160MHz

**.mldWlan.link[1].radio.bandName = "6 GHz (320 MHz)"
**.mldWlan.link[1].radio.centerFrequency = 6.105GHz
**.mldWlan.link[1].radio.channelNumber = 0
**.mldWlan.link[1].radio.receiver.bandwidth = 320MHz

# Enable MLO features
**.mib.ehtMlo = true
**.mib.ehtLdpc = true
**.mldWlan.link[0].mib.ehtOperatingChannelWidth = 160MHz
**.mldWlan.link[1].mib.ehtOperatingChannelWidth = 320MHz

# ---------------------------------------------------------------------------
# Scenario A: Simultaneous Transmit and Receive (STR)
# ---------------------------------------------------------------------------
[Config Str]
description = "MLO with STR enabled. Both 5 GHz and 6 GHz links can transmit simultaneously."
**.mib.ehtStr = true
**.mib.ehtNstr = false

# ---------------------------------------------------------------------------
# Scenario B: Non-Simultaneous Transmit and Receive (NSTR)
# ---------------------------------------------------------------------------
[Config Nstr]
description = "MLO with NSTR. The STA cannot transmit and receive simultaneously on both links, affecting aggregation scheduling."
**.mib.ehtStr = false
**.mib.ehtNstr = true
