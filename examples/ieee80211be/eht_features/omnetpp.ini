[General]
network = inet.examples.ieee80211be.eht_features.Lan80211BeEhtFeatures
sim-time-limit = 1.0s

# Area size and placement
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 700m
**.constraintAreaMaxY = 500m

# Stationary coordinates
**.ap.mobility.typename = "StationaryMobility"
**.host[*].mobility.typename = "StationaryMobility"

**.ap.mobility.initialX = 350m
**.ap.mobility.initialY = 250m
**.host[0].mobility.initialX = 250m
**.host[0].mobility.initialY = 250m

**.mobility.initFromDisplayString = false

# Addressing
**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

# Radio configuration
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

# MAC and QoS
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.isBlockAckSupported = true
**.wlan[*].mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 2000B

# Downlink UDP traffic from the server to host[0]
**.server.numApps = 1
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].destPort = 5000
**.server.app[*].messageLength = 1000B
**.server.app[*].sendInterval = 0.05ms # 160 Mbps approx. Let's make it saturated.
**.server.app[*].startTime = 0.1s
**.server.app[0].destAddresses = "host[0]"
**.server.app[0].packetName = "UdpCbrApp0"

# Host application (UdpSink)
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpSink"
**.host[*].app[0].localPort = 5000

# ---------------------------------------------------------------------------
# Scenario A: Baseline 802.11ax (160 MHz)
# ---------------------------------------------------------------------------
[Config BaselineAx]
description = "Baseline 802.11ax (HE) with a 160 MHz channel, 1024-QAM."
**.server.app[*].sendInterval = 0.005ms # Saturate the link

**.opMode = "ax"
**.bandName = "5 GHz (160 MHz)"
**.centerFrequency = 5.24GHz
**.channelNumber = 1
**.wlan[*].radio.receiver.bandwidth = 160MHz
**.wlan[*].bitrate = -1bps # Use mode-set auto selection.

# Enable HE LDPC for better throughput
**.ap.wlan[*].mib.heLdpc = true
**.host[*].wlan[*].mib.heLdpc = true

# ---------------------------------------------------------------------------
# Scenario B: 802.11be EHT Features (320 MHz, 4096-QAM)
# ---------------------------------------------------------------------------
[Config EhtFeatures]
description = "802.11be (EHT) with a 320 MHz channel in the 6 GHz band, 4096-QAM."
**.server.app[*].sendInterval = 0.002ms # Saturate the much faster link

**.opMode = "be"
**.bandName = "6 GHz (320 MHz)"
**.centerFrequency = 6.105GHz
**.channelNumber = 0 # INET's 6 GHz 320 MHz band uses enumerated channel indices; index 0 is the 6.105 GHz center.
**.wlan[*].radio.receiver.bandwidth = 320MHz

# Advertise the EHT capabilities demonstrated by this scenario.
**.ap.wlan[*].mib.ehtOperatingChannelWidth = 320MHz
**.host[*].wlan[*].mib.ehtOperatingChannelWidth = 320MHz
**.ap.wlan[*].mib.ehtLdpc = true
**.host[*].wlan[*].mib.ehtLdpc = true
**.ap.wlan[*].mib.eht4096Qam = true
**.host[*].wlan[*].mib.eht4096Qam = true
**.ap.wlan[*].mib.ehtMaxMcs = 13
**.host[*].wlan[*].mib.ehtMaxMcs = 13
