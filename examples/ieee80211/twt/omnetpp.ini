[General]
network = inet.examples.ieee80211.twt.TwtRegression
sim-time-limit = 2s
seed-set = 20260623

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 600m
**.constraintAreaMaxY = 360m

*.ap.mobility.typename = "StationaryMobility"
*.ap.mobility.initialX = 300m
*.ap.mobility.initialY = 180m

*.sta[*].mobility.typename = "StationaryMobility"
*.sta[0].mobility.initialX = 170m
*.sta[0].mobility.initialY = 130m
*.sta[1].mobility.initialX = 170m
*.sta[1].mobility.initialY = 230m

**.mobility.initFromDisplayString = false

**.arp.typename = "GlobalArp"

**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
*.ap.wlan[*].address = "10:00:00:00:00:00"
*.sta[*].wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:00"
**.wlan[*].mac.qosStation = true
**.wlan[*].mac.hcf.typename = "HeHcf"
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.wlan[*].mib.heTwtRequester = true
**.wlan[*].mib.heTwtResponder = true
**.wlan[*].mib.heBroadcastTwt = true
**.isBlockAckSupported = true

*.server.numApps = 2
*.server.app[*].typename = "UdpBasicApp"
*.server.app[*].destAddresses = "sta[0] sta[1]"
*.server.app[*].destPort = 5000
*.server.app[*].messageLength = 200B
*.server.app[*].sendInterval = 5ms
*.server.app[*].startTime = 0.5s
*.sta[*].numApps = 1
*.sta[*].app[0].typename = "UdpSink"
*.sta[*].app[0].localPort = 5000

# Baseline and TWT variants keep traffic and seed identical.  Compare
# twtAwakeTime/twtSleepTime and application delivery scalars; a radio energy
# consumer may be enabled by a parent experiment without changing this model.
[Config Baseline]
**.wlan[*].twt.enabled = false
*.sta[*].wlan[*].agent.typename = "Ieee80211AgentSta"

[Config IndividualUnannounced]
**.wlan[*].twt.enabled = true
*.sta[*].wlan[*].agent.requestBroadcast = false
*.sta[*].wlan[*].agent.announced = false
*.sta[*].wlan[*].agent.wakeInterval = 100ms
*.sta[*].wlan[*].agent.wakeDuration = 20ms

[Config IndividualAnnounced]
extends = IndividualUnannounced
*.sta[*].wlan[*].agent.announced = true

[Config Broadcast]
extends = IndividualUnannounced
*.ap.wlan[*].mgmt.createBroadcastSchedule = true
*.ap.wlan[*].mgmt.broadcastId = 1
*.sta[*].wlan[*].agent.requestBroadcast = true
*.sta[*].wlan[*].agent.broadcastId = 1
