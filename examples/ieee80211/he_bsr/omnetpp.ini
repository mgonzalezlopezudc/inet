[General]
network = inet.examples.ieee80211.he_bsr.HeBsrNetwork
sim-time-limit = 2s

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 620m
**.constraintAreaMaxY = 420m

**.ap.mobility.typename = "StationaryMobility"
**.host[*].mobility.typename = "StationaryMobility"
**.mobility.initFromDisplayString = false

**.ap.mobility.initialX = 300m
**.ap.mobility.initialY = 210m
**.host[0].mobility.initialX = 240m
**.host[0].mobility.initialY = 210m
**.host[1].mobility.initialX = 300m
**.host[1].mobility.initialY = 150m
**.host[2].mobility.initialX = 360m
**.host[2].mobility.initialY = 210m

**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].bitrate = 14.625Mbps
**.wlan[*].radio.transmitter.power = 10mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.wlan[*].mac.hcf.enableUlMuOfdma = true
**.ap.wlan[*].mac.hcf.ulScheduler.typename = "HeUlSchedulerBacklogBased"
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 0
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 1
**.ap.wlan[*].mac.hcf.ulScheduler.defaultMcs = 2
**.isBlockAckSupported = true

**.server.numApps = 1
**.server.app[0].typename = "UdpSink"
**.server.app[0].localPort = 5000
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].destAddresses = "server"
**.host[*].app[0].destPort = 5000
**.host[*].app[0].messageLength = 700B
**.host[*].app[0].sendInterval = 0.35ms
**.host[*].app[0].startTime = uniform(0.2s,0.35s)

[Config FullBsrAccounting]
description = "Full HE BSR parsing/accounting drives AP-side UL OFDMA scheduling from fresh per-AC queue reports."

[Config StaleBsr]
description = "Short BSR freshness window forces repeated BSRP polling and exposes stale-report scheduling behavior."
**.ap.wlan[*].mac.hcf.ulCoordinator.reportMaxAge = 1ms

[Config ImplicitBsr]
description = "STAs transmit BSRs implicitly via uplink SU QoS Data frames. AP schedules UL OFDMA without BSRP triggers."
**.ap.wlan[*].mac.hcf.ulTriggerCheckInterval = 0.5s


