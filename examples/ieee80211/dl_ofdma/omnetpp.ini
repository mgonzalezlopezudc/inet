[General]
network = inet.examples.ieee80211.dl_ofdma.Lan80211AxDlOfdma
sim-time-limit = 0.6s

# Area size and placement
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 500m
**.constraintAreaMaxY = 400m

# Stationary coordinates
**.ap.mobility.typename = "StationaryMobility"
**.ap.mobility.initialX = 250m
**.ap.mobility.initialY = 200m

**.host[0].mobility.typename = "StationaryMobility"
**.host[0].mobility.initialX = 150m
**.host[0].mobility.initialY = 200m

**.host[1].mobility.typename = "StationaryMobility"
**.host[1].mobility.initialX = 200m
**.host[1].mobility.initialY = 150m

**.host[2].mobility.typename = "StationaryMobility"
**.host[2].mobility.initialX = 150m
**.host[2].mobility.initialY = 150m

**.mobility.initFromDisplayString = false

# Addressing
**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

# Radio medium setting to allow concurrent OFDMA sub-transmissions
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

# 802.11ax HE configurations
**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].bitrate = 14.625Mbps
**.wlan[*].radio.transmitter.power = 10mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
**.displayHeMuSignalDetails = true
**.heMuSignalLabelMaxUsers = 3
**.displayHeMuSignalPhyFields = true

# Enable QoS classification and multi-user queuing (Hcf/HeHcf)
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerEqualSizedRUs"
**.ap.wlan[*].mac.hcf.dlScheduler.schedulingFunction = "fBW"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 3

# Aggregation and Block Ack settings
**.wlan[*].mac.hcf.originatorMacDataService.msduAggregationPolicy.typename = "BasicMsduAggregationPolicy"
**.isBlockAckSupported = true

# Downlink UDP Application Traffic from Server to Hosts
**.server.numApps = 3
**.server.app[0].typename = "UdpBasicApp"
**.server.app[0].packetName = "UdpBasicApp0"
**.server.app[0].destAddresses = "host[0]"
**.server.app[0].destPort = 5000
**.server.app[0].messageLength = 100B
**.server.app[0].sendInterval = 0.2ms
**.server.app[0].startTime = 0.5s

**.server.app[1].typename = "UdpBasicApp"
**.server.app[1].packetName = "UdpBasicApp1"
**.server.app[1].destAddresses = "host[1]"
**.server.app[1].destPort = 5000
**.server.app[1].messageLength = 100B
**.server.app[1].sendInterval = 0.2ms
**.server.app[1].startTime = 0.5s

**.server.app[2].typename = "UdpBasicApp"
**.server.app[2].packetName = "UdpBasicApp2"
**.server.app[2].destAddresses = "host[2]"
**.server.app[2].destPort = 5000
**.server.app[2].messageLength = 100B
**.server.app[2].sendInterval = 0.2ms
**.server.app[2].startTime = 0.5s

# Host Applications (UdpSinks)
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpSink"
**.host[*].app[0].localPort = 5000

[Config EqualSizedRUs_fBW]
description = "Equal-Sized RUs Scheduler: Maximize Bandwidth occupancy (fBW)"
# (Uses the default settings from [General])

[Config EqualSizedRUs_fHoL]
description = "Equal-Sized RUs Scheduler: Minimize Head-of-Line Delay (fHoL)"
**.ap.wlan[*].mac.hcf.dlScheduler.schedulingFunction = "fHoL"

[Config BacklogBased]
description = "Backlog-Based Scheduler: Dynamic RU sizing based on queue backlogs"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerBacklogBased"

# Generate asymmetric traffic to demonstrate dynamic RU allocation.
# Host 0: heavy traffic (large backlog)
**.server.app[0].messageLength = 1000B
**.server.app[0].sendInterval = 0.1ms

# Host 1: medium traffic
**.server.app[1].messageLength = 400B
**.server.app[1].sendInterval = 0.4ms

# Host 2: light traffic
**.server.app[2].messageLength = 100B
**.server.app[2].sendInterval = 1.0ms

[Config HoLMinDelay]
description = "Head-of-Line Minimum Delay Scheduler (comparison with Backlog-Based)"
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerHoLMinDelay"

# Generate asymmetric traffic (same as BacklogBased to allow comparison)
**.server.app[0].messageLength = 1000B
**.server.app[0].sendInterval = 0.1ms

# Host 1: medium traffic
**.server.app[1].messageLength = 400B
**.server.app[1].sendInterval = 0.4ms

# Host 2: light traffic
**.server.app[2].messageLength = 100B
**.server.app[2].sendInterval = 1.0ms

[Config WideBandwidth80MHz]
description = "Wide-Bandwidth High-Capacity OFDMA scaling: 80 MHz with 8 hosts"
*.numHosts = 8

# AP and 8 Hosts Position Settings
**.ap.mobility.initialX = 250m
**.ap.mobility.initialY = 200m

**.host[0].mobility.initialX = 150m
**.host[0].mobility.initialY = 200m

**.host[1].mobility.initialX = 200m
**.host[1].mobility.initialY = 150m

**.host[2].mobility.initialX = 150m
**.host[2].mobility.initialY = 150m

**.host[3].mobility.initialX = 350m
**.host[3].mobility.initialY = 200m

**.host[4].mobility.initialX = 300m
**.host[4].mobility.initialY = 250m

**.host[5].mobility.initialX = 350m
**.host[5].mobility.initialY = 250m

**.host[6].mobility.initialX = 200m
**.host[6].mobility.initialY = 250m

**.host[7].mobility.initialX = 150m
**.host[7].mobility.initialY = 250m

# Bandwidth configuration
**.bandName = "5 GHz (80 MHz)"
**.centerFrequency = 5.2GHz
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 80MHz
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].bitrate = 61.25Mbps

**.heMuSignalLabelMaxUsers = 8


# AP Scheduler: Equal sized RUs fBW scheduler supporting up to 8 STAs (8x 106-tone RUs)
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerEqualSizedRUs"
**.ap.wlan[*].mac.hcf.dlScheduler.schedulingFunction = "fBW"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 8

# Downlink Traffic from Server to all 8 Hosts
**.server.numApps = 8
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].destPort = 5000
**.server.app[*].messageLength = 100B
**.server.app[*].sendInterval = 0.2ms
**.server.app[*].startTime = 0.5s

# Map each app to a specific host
**.server.app[0].destAddresses = "host[0]"
**.server.app[0].packetName = "UdpBasicApp0"
**.server.app[1].destAddresses = "host[1]"
**.server.app[1].packetName = "UdpBasicApp1"
**.server.app[2].destAddresses = "host[2]"
**.server.app[2].packetName = "UdpBasicApp2"
**.server.app[3].destAddresses = "host[3]"
**.server.app[3].packetName = "UdpBasicApp3"
**.server.app[4].destAddresses = "host[4]"
**.server.app[4].packetName = "UdpBasicApp4"
**.server.app[5].destAddresses = "host[5]"
**.server.app[5].packetName = "UdpBasicApp5"
**.server.app[6].destAddresses = "host[6]"
**.server.app[6].packetName = "UdpBasicApp6"
**.server.app[7].destAddresses = "host[7]"
**.server.app[7].packetName = "UdpBasicApp7"

[Config DlMuMimo]
description = "HE Downlink MU-MIMO: 4-antenna AP spatial-multiplexes 3 stations on the same RU"
# This config uses the same 3-host, 20 MHz topology as EqualSizedRUs_fBW but
# enables HE DL MU-MIMO on the AP.  The AP conducts an NDP sounding sequence
# to collect CSI from each beamformee before scheduling spatial streams.
# After sounding, the EqualSizedRUs scheduler detects at least two MU-MIMO
# eligible candidates and builds a full-channel MU-MIMO PPDU instead of
# OFDMA sub-channel allocation.

# AP: 4 antennas + beamformer capabilities (soundingDimensions must be ≥ 2)
**.ap.wlan[*].radio.antenna.numAntennas = 4
**.ap.wlan[*].mib.heDlMuMimoBeamformer = true
**.ap.wlan[*].mib.heSoundingDimensions = 4
# Sounding feedback must reach at least two beamformees reliably.
**.wlan[*].radio.transmitter.power = 100mW

# Enable MU-MIMO sounding and scheduling in the AP HCF
**.ap.wlan[*].mac.hcf.enableDlMuMimo = true

# STAs: declare as MU-MIMO beamformees capable of feeding back CSI
# feedbackMode 2 = MU-only feedback; beamformeeSts20Mhz = max spatial streams at 20 MHz
**.host[*].wlan[*].mib.heDlMuMimoBeamformee = true
**.host[*].wlan[*].mib.heFeedbackMode = 2
**.host[*].wlan[*].mib.heBeamformeeSts20Mhz = 4

[Config MultiTidBlockAck]
description = "HE Multi-TID Block Ack: AP and stations negotiate Multi-TID Aggregation and pack TID 6/7 traffic into one per-STA A-MPDU"
**.ap.wlan[*].mib.heMultiTidAggregationRx = true
**.ap.wlan[*].mib.heMultiTidAggregationTx = true
**.host[*].wlan[*].mib.heMultiTidAggregationRx = true
**.host[*].wlan[*].mib.heMultiTidAggregationTx = true
**.server.numApps = 6
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].messageLength = 100B
**.server.app[*].sendInterval = 0.2ms
**.server.app[*].startTime = 0.5s
**.server.app[0].destAddresses = "host[0]"
**.server.app[0].destPort = 5000
**.server.app[0].packetName = "UdpBasicApp0-TID6"
**.server.app[1].destAddresses = "host[1]"
**.server.app[1].destPort = 5000
**.server.app[1].packetName = "UdpBasicApp1-TID6"
**.server.app[2].destAddresses = "host[2]"
**.server.app[2].destPort = 5000
**.server.app[2].packetName = "UdpBasicApp2-TID6"
**.server.app[3].destAddresses = "host[0]"
**.server.app[3].destPort = 5001
**.server.app[3].packetName = "UdpBasicApp0-TID7"
**.server.app[4].destAddresses = "host[1]"
**.server.app[4].destPort = 5001
**.server.app[4].packetName = "UdpBasicApp1-TID7"
**.server.app[5].destAddresses = "host[2]"
**.server.app[5].destPort = 5001
**.server.app[5].packetName = "UdpBasicApp2-TID7"
**.host[*].numApps = 2
**.host[*].app[*].typename = "UdpSink"
**.host[*].app[0].localPort = 5000
**.host[*].app[1].localPort = 5001
