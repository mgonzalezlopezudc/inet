[General]
network = inet.showcases.wireless.hefeatures.HeFeaturesShowcase
sim-time-limit = 0.52s

# Area size and placement
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 700m
**.constraintAreaMaxY = 500m

# Stationary coordinates
**.ap.mobility.typename = "StationaryMobility"
**.host[*].mobility.typename = "StationaryMobility"

**.ap.mobility.initialX = 350m
**.ap.mobility.initialY = 250m

**.host[0].mobility.initialX = 250m
**.host[0].mobility.initialY = 250m

**.host[1].mobility.initialX = 350m
**.host[1].mobility.initialY = 150m

**.host[2].mobility.initialX = 450m
**.host[2].mobility.initialY = 250m

**.host[3].mobility.initialX = 350m
**.host[3].mobility.initialY = 350m

**.mobility.initFromDisplayString = false

# Addressing
**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"
**.arp.typename = "GlobalArp"

# Radio medium setting to allow concurrent OFDMA sub-transmissions
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

# 802.11ax HE base configuration on an 80 MHz channel.  80 MHz is required
# because preamble puncturing is only supported for 80/160 MHz operation.
**.opMode = "ax"
**.bandName = "5 GHz (80 MHz)"
**.centerFrequency = 5.2GHz
**.channelNumber = 2
**.wlan[*].radio.receiver.bandwidth = 80MHz
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
**.wlan[*].bitrate = 61.25Mbps

# Enable QoS classification and multi-user queuing (Hcf/HeHcf)
**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
# Use a backlog-aware scheduler because it calls allocateHeRus() with the
# punctured-subchannel mask, making the RU layout puncture-aware.
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerBacklogBased"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 4

# Aggregation and Block Ack settings
**.wlan[*].mac.hcf.originatorMacDataService.msduAggregationPolicy.typename = "BasicMsduAggregationPolicy"
**.isBlockAckSupported = true
**.wlan[*].mac.hcf.originatorAckPolicy.maxBlockAckPolicyFrameLength = 2000B

# Visualize HE MU signal details so that coding, PE duration, and puncturing
# mask are visible in Qtenv and in the vector/scalar outputs.
**.displayHeMuSignalDetails = true
**.heMuSignalLabelMaxUsers = 4
**.displayHeMuSignalPhyFields = true

# Downlink UDP traffic from the server to all hosts.  The relatively large
# messages create enough backlog that the scheduler requests large RUs (up to
# 484-tone once backlog exceeds the 1500 B threshold), which makes preamble
# puncturing visibly force the scheduler to downgrade RU sizes to avoid the
# disabled 20 MHz subchannel.
**.server.numApps = 4
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].destPort = 5000
**.server.app[*].messageLength = 1000B
**.server.app[*].sendInterval = 0.2ms
**.server.app[*].startTime = 0.5s
**.server.app[0].destAddresses = "host[0]"
**.server.app[0].packetName = "UdpBasicApp0"
**.server.app[1].destAddresses = "host[1]"
**.server.app[1].packetName = "UdpBasicApp1"
**.server.app[2].destAddresses = "host[2]"
**.server.app[2].packetName = "UdpBasicApp2"
**.server.app[3].destAddresses = "host[3]"
**.server.app[3].packetName = "UdpBasicApp3"

# Host applications (UdpSinks)
**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpSink"
**.host[*].app[0].localPort = 5000

# ---------------------------------------------------------------------------
# Scenario A: BCC baseline
# ---------------------------------------------------------------------------
[Config BccBaseline]
description = "Baseline HE MU-OFDMA with BCC coding, no packet extension, and no preamble puncturing."
# All HE LDPC and PE parameters default to false / 0 us.

# ---------------------------------------------------------------------------
# Scenario B: HE LDPC timing/accounting and PER gain
# ---------------------------------------------------------------------------
[Config HeLdpc]
description = "Enable HE LDPC at AP and all STAs to demonstrate LDPC codeword accounting, tail-bit omission, packet-duration reduction, and the LDPC SNR boost in the error model."
**.ap.wlan[*].mib.heLdpc = true
**.host[*].wlan[*].mib.heLdpc = true

# ---------------------------------------------------------------------------
# Scenario C: Packet-extension (PE) metadata
# ---------------------------------------------------------------------------
[Config PacketExtension]
description = "Use a non-zero HE packet-extension duration to demonstrate PE timing metadata propagation through the HE MU PHY header."
**.ap.wlan[*].mib.heDefaultPeDurationUs = 8
**.host[*].wlan[*].mib.heDefaultPeDurationUs = 8

# ---------------------------------------------------------------------------
# Scenario D: Validated preamble-puncturing configuration and puncture-aware RU allocation
# ---------------------------------------------------------------------------
[Config PreamblePuncturing]
description = "Puncture the second 20 MHz subchannel of the 80 MHz channel. The AP validates the mask and the scheduler avoids placing RUs on the punctured subchannel."
**.ap.wlan[*].mac.hcf.hePreamblePuncturing = "0100"
# The bit string is parsed from bit 0 (primary 20 MHz) to bit 3.  "0100"
# disables subchannel index 1 while keeping the primary subchannel active.

# ---------------------------------------------------------------------------
# Scenario E: HE LDPC capability negotiation with mixed STA capabilities
# ---------------------------------------------------------------------------
[Config MixedLdpcSupport]
description = "Host 3 does not advertise HE LDPC support. The AP negotiates per-peer capabilities and falls back to BCC for any MU frame that includes host[3]."
**.ap.wlan[*].mib.heLdpc = true
**.host[0].wlan[*].mib.heLdpc = true
**.host[1].wlan[*].mib.heLdpc = true
**.host[2].wlan[*].mib.heLdpc = true
**.host[3].wlan[*].mib.heLdpc = false

# ---------------------------------------------------------------------------
# Scenario F: Combined HE LDPC, PE, and preamble puncturing
# ---------------------------------------------------------------------------
[Config CombinedHeFeatures]
description = "All featured HE PHY/MAC mechanisms enabled together: LDPC, 8 us packet extension, and one punctured 20 MHz subchannel."
**.ap.wlan[*].mib.heLdpc = true
**.host[*].wlan[*].mib.heLdpc = true
**.ap.wlan[*].mib.heDefaultPeDurationUs = 8
**.host[*].wlan[*].mib.heDefaultPeDurationUs = 8
**.ap.wlan[*].mac.hcf.hePreamblePuncturing = "0100"
