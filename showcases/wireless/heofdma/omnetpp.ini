[General]
abstract = true

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 600m
**.constraintAreaMaxY = 400m
**.mobility.typename = "StationaryMobility"
**.mobility.initFromDisplayString = false
**.arp.typename = "GlobalArp"

*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

**.opMode = "ax"
**.bandName = "5 GHz (20 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].bitrate = 14.625Mbps
**.wlan[*].radio.transmitter.power = 10mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

**.mac.qosStation = true
**.wlan[*].classifier.typename = "ExampleQosClassifier"
**.mac.hcf.typename = "HeHcf"
**.isBlockAckSupported = true

**.displayHeMuSignalDetails = true
**.heMuSignalLabelMaxUsers = 3
**.displayHeMuSignalPhyFields = true

[Config DownlinkBase]
abstract = true
network = inet.showcases.wireless.heofdma.HeDlOfdmaShowcase
sim-time-limit = 0.6s

**.ap.mobility.initialX = 250m
**.ap.mobility.initialY = 200m

**.host[0].mobility.initialX = 150m
**.host[0].mobility.initialY = 200m
**.host[1].mobility.initialX = 200m
**.host[1].mobility.initialY = 150m
**.host[2].mobility.initialX = 150m
**.host[2].mobility.initialY = 150m

**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"

**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerEqualSizedRUs"
**.ap.wlan[*].mac.hcf.dlScheduler.schedulingFunction = "fBW"
**.ap.wlan[*].mac.hcf.dlScheduler.maxMuStations = 3
**.wlan[*].mac.hcf.originatorMacDataService.msduAggregationPolicy.typename = "BasicMsduAggregationPolicy"

**.server.numApps = 3
**.server.app[*].typename = "UdpBasicApp"
**.server.app[*].destPort = 5000
**.server.app[*].messageLength = 100B
**.server.app[*].sendInterval = 0.2ms
**.server.app[*].startTime = 0.5s
**.server.app[0].destAddresses = "host[0]"
**.server.app[0].packetName = "UdpBasicApp0"
**.server.app[1].destAddresses = "host[1]"
**.server.app[1].packetName = "UdpBasicApp1"
**.server.app[2].destAddresses = "host[2]"
**.server.app[2].packetName = "UdpBasicApp2"

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpSink"
**.host[*].app[0].localPort = 5000

[Config DlEqualSizedRUs_fBW]
extends = DownlinkBase
description = "Downlink HE MU-OFDMA with equal-sized RUs, maximizing occupied bandwidth."

[Config DlEqualSizedRUs_fHoL]
extends = DownlinkBase
description = "Downlink HE MU-OFDMA with equal-sized RUs, minimizing head-of-line delay by serving all three stations."
**.ap.wlan[*].mac.hcf.dlScheduler.schedulingFunction = "fHoL"

[Config DlBacklogBased]
extends = DownlinkBase
description = "Downlink HE MU-OFDMA with dynamic RU sizes selected from per-station queue backlog."
**.ap.wlan[*].mac.hcf.dlScheduler.typename = "HeDlSchedulerBacklogBased"
**.server.app[0].messageLength = 1000B
**.server.app[0].sendInterval = 0.1ms
**.server.app[1].messageLength = 400B
**.server.app[1].sendInterval = 0.4ms
**.server.app[2].messageLength = 100B
**.server.app[2].sendInterval = 1ms

[Config UplinkBase]
abstract = true
network = inet.showcases.wireless.heofdma.HeUlOfdmaShowcase
sim-time-limit = 2s

**.constraintAreaMaxX = 50m
**.constraintAreaMaxY = 50m

**.ap.mobility.initialX = 25m
**.ap.mobility.initialY = 25m
**.host[0].mobility.initialX = 20m
**.host[0].mobility.initialY = 25m
**.host[1].mobility.initialX = 25m
**.host[1].mobility.initialY = 20m
**.host[2].mobility.initialX = 30m
**.host[2].mobility.initialY = 25m

**.ap.wlan[*].address = "10:00:00:00:00:00"
**.host[*].**.mgmt.accessPointAddress = "10:00:00:00:00:00"

**.wlan[*].mac.hcf.enableUlMuOfdma = true
**.ap.wlan[*].mac.hcf.ulScheduler.typename = "HeUlSchedulerBacklogBased"
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 1
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 3

**.server.numApps = 1
**.server.app[0].typename = "UdpSink"
**.server.app[0].localPort = 5000

**.host[*].numApps = 1
**.host[*].app[0].typename = "UdpBasicApp"
**.host[*].app[0].packetName = "UdpBasicApp-" + string(parentIndex())
**.host[*].app[0].destAddresses = "server"
**.host[*].app[0].destPort = 5000
**.host[*].app[0].messageLength = 400B
**.host[*].app[0].sendInterval = 0.4ms
**.host[*].app[0].startTime = 0.2s

[Config UlScheduledOnly]
extends = UplinkBase
description = "Uplink baseline with BSR polling but no random-access RUs."
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 0
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 0

[Config UlMixedUora]
extends = UplinkBase
description = "Uplink HE MU-OFDMA with scheduled RUs mixed with UORA random-access RUs."
**.ap.wlan[*].mac.hcf.ulScheduler.minRandomAccessRus = 1
**.ap.wlan[*].mac.hcf.ulScheduler.maxRandomAccessRus = 3
**.ap.wlan[*].mac.hcf.ulScheduler.maxMuStations = 2

[Config UlEqualRus]
extends = UplinkBase
description = "Uplink HE MU-OFDMA with equal-sized RUs."
**.ap.wlan[*].mac.hcf.ulScheduler.typename = "HeUlSchedulerEqualSizedRUs"
